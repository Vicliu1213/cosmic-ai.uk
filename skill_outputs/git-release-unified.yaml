schema_version: '1.0'
metadata:
  id: git-release
  name: Git Release
  description: Create consistent releases and changelogs
  version: 1.0.0
  license: MIT
  categories:
  - devops
  - github
platforms:
  opencode:
    enabled: true
    path: .opencode/skills/git-release/SKILL.md
    compatibility: opencode
  claude:
    enabled: true
    function_name: git_release
    module: skills.git-release
  cursor:
    enabled: true
    command_id: opencode.gitRelease
    keybinding: ctrl+shift+o
  codelaw:
    enabled: true
    rule_id: git-release-rule
    severity: info
capabilities:
- Draft release notes from merged PRs
- Propose a version bump
- Generate copy-pasteable gh commands
metadata_extra:
  audience: maintainers
  workflow: github
