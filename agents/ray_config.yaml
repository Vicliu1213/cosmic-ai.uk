# Ray 分布式計算配置
# Ray Distributed Computing Configuration

cluster:
  # CPU 核心數 (null 表示自動檢測)
  num_cpus: null
  
  # GPU 數量
  num_gpus: 0
  
  # 內存大小 (GB, null 表示自動檢測)
  memory_gb: null
  
  # 啟用 Ray 儀表板
  dashboard: true
  
  # 臨時目錄
  temp_dir: ~/.ray_temp

performance:
  # 對象存儲內存 (GB)
  object_store_memory_gb: null
  
  # Redis 密碼
  redis_password: null
  
  # 自定義資源
  resources: {}

tuning:
  # 啟用對象引用計數
  enable_object_reference_counting: true
  
  # 啟用對象溢出
  object_spilling_enabled: true
  
  # 對象溢出配置
  object_spilling_config:
    type: filesystem
    params:
      directory_path: /tmp/ray_spill

logging:
  # 日誌級別 (DEBUG, INFO, WARNING, ERROR)
  level: INFO
  
  # 日誌文件路徑
  file_path: /var/log/ray

# 分布式計算模塊配置
distributed_computing:
  # 量子引擎配置
  quantum_engine:
    # 是否使用分布式計算
    use_distribution: true
    
    # 批次大小 (auto 表示自動計算)
    batch_size: auto
    
    # 工作者數量 (auto 表示自動檢測)
    workers: auto
    
    # 並行分析數量
    parallel_analyses: 4
    
    # 理論分布式配置
    theories_distribution: balanced

  # 數據管理器配置
  data_manager:
    # 是否使用分布式計算
    use_distribution: true
    
    # 壓縮工作者數量
    compression_workers: auto
    
    # 並行批次大小
    parallel_batch_size: auto
    
    # 最大並行壓縮任務數
    max_parallel_tasks: 8
    
    # 壓縮級別 (1-9)
    compression_level: 6

  # 遺傳算法配置
  genetic_algorithm:
    # 是否使用分布式計算
    use_distribution: true
    
    # 種群分布策略 (balanced, distributed)
    population_distribution: balanced
    
    # 工作者數量
    workers: auto
    
    # 每個工作者的種群大小
    population_per_worker: 50
    
    # 進化策略
    evolution_strategy: generational

# 優化提示
optimization:
  # 自動調優
  auto_tuning: true
  
  # 監控指標
  monitoring:
    enabled: true
    interval_seconds: 5
  
  # 性能目標
  performance_targets:
    cpu_utilization: 0.85
    memory_utilization: 0.80
    throughput_mbps: 1000

# 容錯和恢復
fault_tolerance:
  # 啟用檢查點
  enable_checkpointing: true
  
  # 檢查點間隔 (秒)
  checkpoint_interval: 300
  
  # 重試次數
  max_retries: 3
  
  # 重試延遲 (秒)
  retry_delay: 5
