# EthanAlgoX 集成配置文件
# Unified Integration Configuration

integration:
  # 集成模式
  mode: "production"  # development, staging, production
  
  # 启用的集成模块
  enabled_modules:
    - marketbot
    - llm_tradebot
    - strategy_adapters
  
  # 全局超时配置
  timeouts:
    default: 30
    long_operation: 300
    websocket: 60

  # 重试策略
  retry_policy:
    max_retries: 3
    initial_delay: 1
    max_delay: 30
    backoff_factor: 2

# MarketBot 和 LLM-TradeBot 的集成流程
flow:
  # 交易信号流程
  trading_signal:
    steps:
      - name: "validate"
        module: "cosmic"
      - name: "route_to_llm"
        module: "llm_tradebot"
      - name: "notify_marketbot"
        module: "marketbot"
      - name: "execute"
        module: "cosmic"
  
  # 风险管理流程
  risk_management:
    steps:
      - name: "monitor"
        module: "cosmic"
      - name: "assess"
        module: "llm_tradebot"
      - name: "alert"
        module: "marketbot"

# 数据同步配置
synchronization:
  # 投资组合更新频率
  portfolio_update_interval: 60  # 秒
  
  # 性能指标同步
  metrics_sync_interval: 300  # 5 分钟
  
  # 历史数据保留
  history_retention_days: 30

# 性能监控
monitoring:
  # 启用性能监控
  enabled: true
  
  # 指标收集
  metrics:
    - latency
    - throughput
    - error_rate
    - success_rate
  
  # 告警阈值
  alerts:
    high_latency_threshold_ms: 1000
    error_rate_threshold: 0.05
    low_success_rate_threshold: 0.95

# 安全配置
security:
  # SSL/TLS
  use_ssl: true
  verify_ssl: true
  
  # API 密钥加密
  encrypt_keys: true
  key_rotation_days: 90
  
  # 速率限制
  rate_limiting:
    enabled: true
    requests_per_minute: 60
    burst_size: 10

# 日志配置
logging:
  level: INFO
  format: "json"  # json, text
  output:
    - console
    - file
  
  file:
    path: "logs/integration.log"
    max_size_mb: 100
    backup_count: 10
    compression: "gzip"
