# ============================================================================
# 量子算法優化配置 (Quantum Algorithm Optimization Parameters)
# ============================================================================
# 這個檔案配置量子算法優化的各種進化策略、粒子群優化、差分進化和遺傳算法。
# 支持多種優化方法的並行運行和比較。
# ============================================================================

# ============================================================================
# 1. 全局優化配置 (Global Optimization Settings)
# ============================================================================
optimization:
  enabled: true
  version: "1.0"
  description: "Quantum Algorithm Optimization Parameters"
  
  # 優化模式選擇
  mode: "hybrid"                # "hybrid", "evolutionary", "swarm", "differential", "genetic", "annealing"
  
  # 目標設置
  objectives:
    primary: "maximize_fitness" # "maximize_fitness", "minimize_cost", "maximize_sharpe"
    secondary: []               # 可選的次要目標
    
  # 約束條件
  constraints:
    max_generations: 500        # 最大代數 [50, 5000]
    convergence_tolerance: 1e-6 # 收斂容差 [1e-8, 1e-3]
    time_limit_seconds: 3600    # 時間限制（秒）
    memory_limit_mb: 2048       # 內存限制（MB）

# ============================================================================
# 2. 演化策略配置 (Evolutionary Strategy)
# ============================================================================
evolutionary:
  enabled: true
  
  # 變異操作 (Mutation)
  mutation:
    type: "gaussian"            # "gaussian", "uniform", "cauchy", "adaptive"
    std_dev: 0.1                # 高斯變異標準差 [0.01, 1.0]
    adaptive: true              # 根據進度自適應變異率
    
    # 自適應參數
    adaptive_settings:
      initial_std: 0.3          # 初始標準差 [0.1, 1.0]
      final_std: 0.01           # 最終標準差 [0.001, 0.1]
      decay_schedule: "exponential"  # "exponential", "linear", "step"
    
  # 交叉操作 (Crossover)
  crossover:
    type: "blend"               # "single_point", "two_point", "uniform", "blend"
    blend_alpha: 0.5            # Blend 交叉的 α 參數 [0.0, 1.0]
    crossover_probability: 0.9  # 交叉概率 [0.5, 1.0]
    
  # 選擇操作 (Selection)
  selection:
    method: "tournament"        # "tournament", "roulette", "rank", "best"
    tournament_size: 3          # 錦標賽規模 [2, 10]
    selection_pressure: 1.5     # 選擇壓力 [1.0, 5.0]
    
  # 群體管理
  population:
    size: 50                    # 種群大小 [20, 500]
    elite_preservation: 0.1     # 精英保留百分比 [0.05, 0.3]
    replacement_strategy: "generational"  # "generational", "steady_state", "random"

# ============================================================================
# 3. 粒子群優化配置 (Particle Swarm Optimization)
# ============================================================================
particle_swarm:
  enabled: true
  
  # 基本參數
  num_particles: 30             # 粒子數量 [10, 200]
  inertia_weight: 0.7           # 慣性權重 [0.3, 0.9]
  cognitive_coefficient: 1.5   # c1 認知係數 [0.5, 2.5]
  social_coefficient: 1.5      # c2 社會係數 [0.5, 2.5]
  max_velocity: 0.5             # 最大速度 [0.1, 2.0]
  
  # 自適應設置
  adaptive:
    enabled: true
    w_start: 0.9                # 初始慣性權重 [0.5, 1.0]
    w_end: 0.4                  # 最終慣性權重 [0.1, 0.5]
    w_schedule: "linear"        # "linear", "exponential", "step"
    
  # 速度限制
  velocity_limits:
    use_dynamic_limits: true    # 使用動態速度限制
    limit_type: "percentage"    # "percentage" 或 "absolute"
    limit_value: 0.2            # 限制值 [0.1, 1.0]
    
  # 拓撲結構
  topology:
    type: "gbest"               # "gbest", "lbest", "random"
    neighborhood_size: 3        # 鄰域大小（針對 lbest）[2, 10]

# ============================================================================
# 4. 差分進化配置 (Differential Evolution)
# ============================================================================
differential_evolution:
  enabled: true
  
  # DE 策略
  strategy: "best/1/bin"        # "best/1/bin", "rand/1/bin", "best/2/bin", "rand/2/bin"
  
  # 參數
  f: 0.8                        # 縮放因子 (F) [0.3, 1.5]
  cr: 0.9                       # 交叉概率 (CR) [0.1, 1.0]
  population_size: 50           # 種群大小 [10, 500]
  
  # 自適應 DE (jDE)
  adaptive_de:
    enabled: false
    f_lower: 0.3
    f_upper: 1.5
    cr_lower: 0.0
    cr_upper: 1.0
    
  # 變異邊界處理
  boundary_handling:
    method: "clip"              # "clip", "reflect", "wrap", "random"
    enforce_bounds: true
    
  # 收斂控制
  convergence:
    best_fitness_tracking: true
    stagnation_tolerance: 1e-8  # 停滯容差 [1e-12, 1e-3]

# ============================================================================
# 5. 遺傳算法配置 (Genetic Algorithm)
# ============================================================================
genetic_algorithm:
  enabled: true
  
  # 基本參數
  population_size: 50           # 種群大小 [20, 500]
  elite_preservation: 0.1       # 精英保留百分比 [0.05, 0.3]
  mutation_rate: 0.05           # 變異率 [0.01, 0.2]
  crossover_rate: 0.9           # 交叉率 [0.5, 1.0]
  
  # 基因表示
  gene_representation:
    type: "real"                # "real", "binary", "permutation"
    bits_per_gene: 32           # 每基因比特數（針對二進制）
    
  # 遺傳操作
  genetic_operators:
    mutation_type: "gaussian"   # "gaussian", "uniform", "adaptive"
    crossover_type: "blend"     # "single_point", "two_point", "blend"
    selection_method: "tournament"  # "tournament", "roulette", "rank"

# ============================================================================
# 6. 模擬退火配置 (Simulated Annealing)
# ============================================================================
simulated_annealing:
  enabled: true
  
  # 溫度控制
  initial_temperature: 100      # 初始溫度 [10, 1000]
  cooling_rate: 0.95            # 冷卻率 [0.8, 0.99]
  min_temperature: 0.01         # 最小溫度 [0.001, 0.1]
  iterations_per_temp: 10       # 每溫度的迭代數 [1, 100]
  
  # 溫度調度
  temperature_schedule:
    type: "exponential"         # "exponential", "linear", "geometric", "logarithmic"
    decay_factor: 0.95          # 衰減因子 [0.8, 0.99]
    
  # Metropolis 接受准則
  acceptance:
    method: "metropolis"        # "metropolis", "boltzmann"
    boltzmann_constant: 1.0     # Boltzmann 常數（K）

# ============================================================================
# 7. 群體多樣性管理 (Population Diversity Management)
# ============================================================================
diversity_management:
  enabled: true
  
  # 多樣性度量
  diversity_metric: "genotype"  # "genotype", "phenotype", "fitness"
  
  # 多樣性維護
  maintenance:
    min_diversity_threshold: 0.1  # 最小多樣性閾值 [0.01, 0.5]
    diversity_restoration_enabled: true
    
    # 恢復機制
    restoration:
      method: "mutation"        # "mutation", "random_replacement", "hybrid"
      replacement_ratio: 0.1    # 替換比例 [0.05, 0.3]
      
  # 適應度滑翔防止
  fitness_sharing:
    enabled: false
    niche_radius: 0.5
    sharing_parameter: 1.0

# ============================================================================
# 8. 收斂和終止條件 (Convergence & Termination Criteria)
# ============================================================================
convergence:
  # 終止條件
  termination_criteria:
    - "max_generations"         # 達到最大代數
    - "fitness_plateau"         # 適應度平台
    - "time_limit"              # 時間限制
    - "target_fitness"          # 達到目標適應度
    
  # 目標設置
  target_fitness: null          # 目標適應度值（null = 自動）
  
  # 停滯檢測
  stagnation_detection:
    enabled: true
    patience: 30                # 停滯代數 [10, 100]
    min_improvement: 1e-6       # 最小改善 [1e-10, 1e-3]
    
  # 早停
  early_stopping:
    enabled: true
    validation_fraction: 0.2    # 驗證集分數
    patience_epochs: 20         # 耐心值 [5, 50]

# ============================================================================
# 9. 混合優化策略 (Hybrid Optimization Strategy)
# ============================================================================
hybrid:
  enabled: true
  
  # 多策略並行執行
  parallel_strategies:
    - "evolutionary"            # 同時運行多個策略
    - "particle_swarm"
    - "differential_evolution"
    
  # 策略交互
  interaction:
    sharing_enabled: true       # 策略間共享信息
    sharing_interval: 50        # 共享間隔（代數）
    population_swap_size: 5     # 交換的個體數量 [1, 20]
    
  # 權重分配
  strategy_weights:
    evolutionary: 0.4
    particle_swarm: 0.3
    differential_evolution: 0.3

# ============================================================================
# 10. 性能監測和診斷 (Performance Monitoring & Diagnostics)
# ============================================================================
monitoring:
  # 追踪指標
  track_best_fitness: true
  track_average_fitness: true
  track_worst_fitness: true
  track_fitness_variance: true
  track_population_diversity: true
  track_convergence_rate: true
  
  # 日志設置
  logging:
    enabled: true
    level: "INFO"               # "DEBUG", "INFO", "WARNING"
    file: "logs/quantum_optimization.log"
    
    # 日志頻率
    log_interval: 10            # 代數間隔
    save_best_solutions: true
    max_solutions_saved: 100
    
  # 可視化
  visualization:
    enabled: false
    plot_convergence: true
    plot_diversity: true
    save_plots: false
    plot_dir: "plots/quantum_optimization"

# ============================================================================
# 11. 並行化和分布式執行 (Parallelization & Distributed Execution)
# ============================================================================
parallelization:
  enabled: true
  
  # 並行後端
  backend: "ray"                # "ray", "multiprocessing", "joblib"
  num_workers: 4                # 工作進程數 [1, 16]
  
  # Ray 特定設置
  ray:
    object_store_memory_mb: 1000  # Ray 對象存儲大小
    redis_memory_mb: 500          # Redis 內存大小
    
  # 批處理
  batch_size: 32                # 評估批大小 [1, 256]
  async_evaluation: true        # 異步評估
  
  # 負載均衡
  load_balancing:
    enabled: true
    strategy: "dynamic"         # "dynamic", "static", "round_robin"

# ============================================================================
# 12. 超參數自適應 (Hyperparameter Adaptation)
# ============================================================================
adaptation:
  enabled: true
  
  # 動態超參數調整
  dynamic_adjustment:
    mutation_rate_adaptation: true
    crossover_rate_adaptation: true
    selection_pressure_adaptation: true
    
  # 適應規則
  adaptation_rules:
    - metric: "diversity"
      trigger: "<0.2"           # 多樣性低於 0.2
      action: "increase_mutation"
      amount: 0.05
      
    - metric: "stagnation"
      trigger: ">50"            # 停滯超過 50 代
      action: "increase_diversity"
      amount: 0.1

# ============================================================================
# 13. 配置預設檔案 (Configuration Profiles)
# ============================================================================
# 選項: "conservative", "balanced", "aggressive"
# - conservative: 穩定、低風險、緩慢收斂
# - balanced: 平衡速度和穩定性
# - aggressive: 快速收斂、高風險
default_profile: "balanced"

profiles:
  conservative:
    population_size: 100
    mutation_rate: 0.02
    crossover_rate: 0.8
    cooling_rate: 0.99
    elite_preservation: 0.2
    convergence_tolerance: 1e-8
    
  balanced:
    population_size: 50
    mutation_rate: 0.05
    crossover_rate: 0.9
    cooling_rate: 0.95
    elite_preservation: 0.1
    convergence_tolerance: 1e-6
    
  aggressive:
    population_size: 30
    mutation_rate: 0.1
    crossover_rate: 1.0
    cooling_rate: 0.9
    elite_preservation: 0.05
    convergence_tolerance: 1e-4

# ============================================================================
# 14. 驗證和邊界條件 (Validation & Boundary Conditions)
# ============================================================================
validation:
  # 參數驗證
  validate_parameters_on_startup: true
  
  # 邊界條件
  bounds:
    enforce_box_constraints: true
    penalty_method: "static"    # "static", "dynamic", "barrier"
    penalty_factor: 1.0         # 懲罰因子 [0.1, 10.0]
    
  # 冗餘檢查
  redundancy_check:
    remove_duplicates: true
    diversity_threshold: 1e-6
    
  # 恢復機制
  recovery:
    handle_invalid_solutions: true
    invalid_solution_method: "regenerate"  # "regenerate", "repair", "penalty"
