firewall:
  allowed_ports:
  - 80
  - 443
  - 8080
  blocked_ips: []
  enabled: true
  rate_limiting: true
load_balancing:
  algorithm: round_robin
  enabled: true
  failover_timeout: 5
  health_check_interval: 30
networking:
  certificate_path: /etc/ssl/cert.pem
  host: 0.0.0.0
  port: 8080
  private_key_path: /etc/ssl/key.pem
  protocol: HTTPS
  ssl_enabled: true
proxy:
  enabled: false
  http_proxy: null
  https_proxy: null
