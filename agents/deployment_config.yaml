# 部署配置
# Deployment Configuration

deployment:
  # 環境設置
  environments:
    development:
      debug: true
      log_level: DEBUG
      database: sqlite
      cache_enabled: true
    
    staging:
      debug: false
      log_level: INFO
      database: sqlite
      cache_enabled: true
    
    production:
      debug: false
      log_level: WARNING
      database: sqlite
      cache_enabled: true

  # 健康檢查
  health_check:
    enabled: true
    interval: 60  # 秒
    timeout: 10
    endpoint: /api/health
    checks:
      - database
      - redis
      - quantum_engine
      - trading_system

  # 自動重啟
  auto_restart:
    enabled: true
    max_retries: 3
    retry_delay: 30  # 秒

  # 優雅關閉
  graceful_shutdown:
    enabled: true
    timeout: 30  # 秒
    wait_for_tasks: true

  # 資源限制
  resource_limits:
    max_memory: 8GB
    max_cpu: 4
    max_disk: 50GB

# Docker 部署設置
docker:
  image: comic-ai:latest
  registry: docker.io
  
  # 容器配置
  container:
    name: comic-ai-container
    restart_policy: unless-stopped
    network: cosmic-ai-network
    
    # 環境變數
    environment:
      COMIC_AI_ENV: production
      LOG_LEVEL: INFO
    
    # 數據卷
    volumes:
      - ./config:/root/comic_ai/config
      - ./data:/root/comic_ai/data
      - ./logs:/root/comic_ai/logs
    
    # 端口映射
    ports:
      - "8080:8080"  # Dashboard
      - "8081:8081"  # CLI
      - "8083:8083"  # HTTP Server

# Kubernetes 部署設置
kubernetes:
  enabled: false
  namespace: comic-ai
  
  # 副本集
  replicas: 1
  
  # 資源要求
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "8Gi"
      cpu: "4"
  
  # 健康探針
  probes:
    liveness:
      enabled: true
      initial_delay: 30
      period: 10
    readiness:
      enabled: true
      initial_delay: 10
      period: 5

# 監控和告警
monitoring:
  enabled: true
  
  # Prometheus
  prometheus:
    enabled: true
    port: 9090
    scrape_interval: 15s
  
  # 告警
  alerts:
    enabled: true
    channels:
      - telegram
      - email
    
    rules:
      - name: HighCPUUsage
        condition: cpu_usage > 80
        severity: warning
      
      - name: LowDiskSpace
        condition: disk_free < 10GB
        severity: critical
      
      - name: SystemDown
        condition: system_uptime == 0
        severity: critical
