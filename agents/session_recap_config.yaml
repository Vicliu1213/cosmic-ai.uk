# Session Recap & Task Management Configuration
# 自動化回顧與任務管理配置

recap:
  # 回顧系統設置
  enabled: true
  auto_recap_on_start: true
  max_history_lines: 50
  
  # 任務跟踪
  task_tracking:
    enabled: true
    auto_save_todos: true
    todo_file: ".session_todos.json"
    
  # 回顧策略
  recap_strategy:
    include_recent_commits: true
    max_commits: 10
    include_git_status: true
    include_test_results: true
    include_recent_changes: true
    
  # 輸出格式
  output_format:
    show_summary: true
    show_commits: true
    show_changes: true
    show_todos: true
    show_recommendations: true
    
  # 自動操作
  auto_actions:
    run_tests_after_recap: false
    create_recap_report: true
    report_file: "logs/session_recap.md"

session:
  # 會話管理
  store_history: true
  history_dir: "logs/session_history"
  max_sessions: 20
  
git:
  # Git 相關設置
  track_branches: true
  auto_commit_prompt: false
  
logging:
  # 日誌設置
  level: "INFO"
  file: "logs/recap.log"
  format: "[%(asctime)s] %(levelname)s: %(message)s"
