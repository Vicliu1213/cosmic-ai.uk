name: Code Quality & Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest pytest-cov mypy bandit

    - name: Check Python syntax
      run: |
        echo "🔍 Checking Python syntax..."
        find src/ -name "*.py" -type f -exec python -m py_compile {} \;
        echo "✅ All files have valid syntax"

    - name: Lint with flake8
      run: |
        echo "🔍 Running flake8..."
        flake8 src/ \
          --max-line-length=127 \
          --select=E9,F63,F7,F82 \
          --statistics \
          --exit-zero || true
        echo "✅ Flake8 check complete"

    - name: Type check with mypy
      run: |
        echo "🔍 Running mypy..."
        mypy src/ --ignore-missing-imports --no-error-summary || true
        echo "✅ Type check complete"

    - name: Security check with bandit
      run: |
        echo "🔍 Running bandit..."
        bandit -r src/ -ll -i -x || true
        echo "✅ Security check complete"

    - name: Run pytest
      run: |
        echo "🧪 Running tests..."
        python -m pytest src/tests/ -v --tb=short --cov=src --cov-report=xml
        echo "✅ Tests complete"

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  pre-commit-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - uses: pre-commit/action@v3.0.0
