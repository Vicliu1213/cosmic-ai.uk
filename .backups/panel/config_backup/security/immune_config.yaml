# Immune Reconfiguration Engine Configuration
version: "1.0.0"
description: "Configuration for immune system based reconfiguration"

# Immune System Settings
immune_system:
  # Cell Type Configuration
  cell_types:
    T-cell:
      count: 12
      base_strength: 0.75
      specialization: "error_detection"
      response_time: 100  # ms
      
    B-cell:
      count: 10
      base_strength: 0.65
      specialization: "anomaly_detection"
      memory_capacity: 50
      
    NK-cell:
      count: 8
      base_strength: 0.85
      specialization: "inefficiency_detection"
      attack_range: 0.9
      
  # Response Parameters
  response_threshold: 0.8
  memory_decay: 0.95
  adaptation_rate: 0.15
  immune_timeout: 5000  # ms
  
  # Communication
  cell_communication:
    signal_strength: 0.9
    propagation_speed: 0.8
    interference_threshold: 0.1

# Quantum Enhancement Settings
quantum_enhancement:
  coherence_threshold: 0.92
  entanglement_depth: 6
  superposition_states: 4
  quantum_collapse_probability: 0.05
  
  # Quantum Memory
  quantum_memory:
    storage_capacity: 1000
    retrieval_accuracy: 0.98
    coherence_time: 10000  # ms
    
  # Quantum Communication
  quantum_communication:
    entanglement_pairs: 12
    decoherence_rate: 0.01
    signal_amplification: 1.5

# Detection & Monitoring
monitoring:
  # Metrics Collection
  metrics_interval: 1000  # ms
  alert_thresholds:
    cpu_usage: 0.85
    memory_usage: 0.80
    error_rate: 0.05
    response_time: 2000  # ms
    
  # Anomaly Detection
  anomaly_detection:
    sensitivity: 0.9
    false_positive_tolerance: 0.1
    pattern_recognition_depth: 5
    
# Recovery Strategies
recovery_strategies:
  auto_recovery:
    enabled: true
    max_attempts: 3
    success_threshold: 0.8
    
  rollback_strategy:
    checkpoint_interval: 60000  # ms
    max_rollback_points: 10
    rapid_rollback: true
    
  resource_scaling:
    auto_scale_up: true
    auto_scale_down: false
    scale_factor: 1.5
    
# Evolution & Learning
evolution:
  # Genetic Algorithm Parameters
  population_size: 50
  generations: 100
  mutation_rate: 0.1
  crossover_rate: 0.8
  elite_fraction: 0.2
  
  # Learning Parameters
  learning_rate: 0.01
  experience_decay: 0.99
  knowledge_transfer: true
  
  # Adaptation
  adaptation_threshold: 0.7
  exploration_rate: 0.15
  exploitation_rate: 0.85

# Logging & Debugging
logging:
  level: "INFO"
  file: "logs/immune_engine.log"
  max_size: "50MB"
  backup_count: 10
  
  # Debug Mode
  debug_mode: false
  trace_immune_responses: true
  log_quantum_states: false
  
# Security
security:
  authentication_required: false
  access_control:
    read_only: false
    admin_only_operations: ["system_shutdown", "config_reset"]
    
  # Isolation
  quarantine_violations: true
  sandbox_test_env: true