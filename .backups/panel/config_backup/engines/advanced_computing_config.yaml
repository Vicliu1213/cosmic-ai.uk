# 前沿科學計算模組配置
# Advanced Computing Module Configuration

advanced_computing:
  # 計算範式配置 / Computing Paradigm Configuration
  paradigms:
    enabled: true
    
    classical:
      enabled: true
      description: "經典計算"
      
    quantum_inspired:
      enabled: true
      description: "量子啟發計算"
      
    neuromorphic:
      enabled: true
      description: "神經擬態計算"
      
    hybrid_quantum_classical:
      enabled: true
      description: "量子-經典混合計算"
      
    biological_computing:
      enabled: true
      description: "生物計算"
      
  # 並行處理配置 / Parallel Processing Configuration
  parallel_processing:
    enabled: true
    
    # 工作線程 / Worker Threads
    workers: [1, 64]
    
    # 批處理大小 / Batch Size
    batch_size: [1, 10000]
    
    # 任務隊列 / Task Queue
    queue_size: [100, 1000000]
    
  # 記憶體優化配置 / Memory Optimization Configuration
  memory_optimization:
    enabled: true
    
    # 記憶體池 / Memory Pool
    pool_enabled: true
    
    # 壓縮 / Compression
    compression_enabled: true
    compression_level: [1, 9]
    
    # 最大記憶體 / Max Memory
    max_memory_mb: [256, 32768]
    
  # 量子啟發優化器配置 / Quantum-Inspired Optimizer Configuration
  quantum_inspired_optimizer:
    enabled: true
    
    # 量子退火 / Quantum Annealing
    quantum_annealing:
      enabled: true
      
      # 溫度調度 / Temperature Schedule
      temperature_schedule: "exponential"  # exponential, linear
      initial_temperature: [0.1, 10.0]
      final_temperature: [1e-8, 1e-4]
      
      # 冷卻速率 / Cooling Rate
      cooling_rate: [0.9, 0.99]
      
      # 迭代次數 / Iterations
      iterations: [100, 10000]
      
    # 變分量子特徵求解器 / Variational Quantum Eigensolver
    vqe:
      enabled: true
      
      # 量子比特數 / Number of Qubits
      qubits: [2, 32]
      
      # 變分參數 / Variational Parameters
      param_count: [4, 512]
      
      # 學習率 / Learning Rate
      learning_rate: [0.001, 0.1]
      
  # 適應參數配置 / Adaptive Parameters Configuration
  adaptive_parameters:
    enabled: true
    
    # 動態調整 / Dynamic Adjustment
    dynamic_adjustment: true
    
    # 適應率 / Adaptation Rate
    adaptation_rate: [0.01, 0.5]
    
    # 學習窗口 / Learning Window
    learning_window: [10, 1000]
    
  # 噪聲容度配置 / Noise Tolerance Configuration
  noise_tolerance:
    enabled: true
    
    # 噪聲水平 / Noise Level
    tolerance_range: [0.0, 0.1]
    
    # 誤差修正 / Error Correction
    error_correction_enabled: true
    
    # 魯棒性 / Robustness
    robustness_level: [0.8, 1.0]
    
  # 收斂配置 / Convergence Configuration
  convergence:
    enabled: true
    
    # 收斂閾值 / Convergence Threshold
    threshold: [1e-10, 1e-4]
    
    # 最大迭代 / Max Iterations
    max_iterations: [100, 100000]
    
    # 早停 / Early Stopping
    early_stopping: true
    patience: [10, 1000]

# 配置檔案 / Configuration Profiles
profiles:
  conservative:
    description: "保守模式"
    parallel_processing.workers: 4
    quantum_inspired_optimizer.quantum_annealing.iterations: 1000
    noise_tolerance.tolerance_range: [0.0, 0.01]
    
  balanced:
    description: "平衡模式"
    parallel_processing.workers: 16
    quantum_inspired_optimizer.quantum_annealing.iterations: 5000
    noise_tolerance.tolerance_range: [0.0, 0.05]
    
  aggressive:
    description: "激進模式"
    parallel_processing.workers: 64
    quantum_inspired_optimizer.quantum_annealing.iterations: 10000
    quantum_inspired_optimizer.vqe.qubits: 32
    noise_tolerance.tolerance_range: [0.0, 0.1]
