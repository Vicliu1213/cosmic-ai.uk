# 通用量子生成服務配置
# Universal Quantum Generation Service (UQG) Configuration

universal_quantum_generation:
  # 系統啟用狀態 / System Enable Status
  enabled: true
  description: "通用量子生成服務 - 為所有系統節點提供量子資源"
  
  # 服務節點配置 / Service Node Configuration
  nodes:
    total_count: 546
    active_nodes: 546
    
    # 節點分配 / Node Allocation
    allocation:
      qft_nodes: 512      # 量子場論系統節點
      es_nodes: 18        # 指數協同網絡節點
      ip_nodes: 16        # 永恆永久系統節點
  
  # 量子資源配置 / Quantum Resources Configuration
  resources:
    # 量子位元配置 / Quantum Bits Configuration
    qubits:
      qft_per_node: 2      # 每個 QFT 節點 2 個量子位元
      es_per_node: 3       # 每個 ES 節點 3 個量子位元
      ip_per_node: 4       # 每個 IP 節點 4 個量子位元
      
      total_qubits: 1078   # 總計: 512*2 + 18*3 + 16*4
    
    # 量子操作配置 / Quantum Operations Configuration
    operations:
      total_operations: 1165
      
      # 各系統的操作數
      qft_operations: 1024   # QFT 系統操作數
      es_operations: 59      # ES 系統操作數
      ip_operations: 82      # IP 系統操作數
    
    # 量子成本配置 / Quantum Cost Configuration
    costs:
      total_cost: 1.215      # 總量子成本
      cost_per_operation: 0.00104  # 每個操作的成本
      
      # 各系統的成本
      qft_cost: 1.024
      es_cost: 0.077
      ip_cost: 0.114
  
  # 量子操作集合 / Quantum Operation Set
  operations:
    supported_gates:
      - hadamard      # H 門
      - pauli_x       # X 門
      - pauli_y       # Y 門
      - pauli_z       # Z 門
      - cnot          # CNOT 門
      - measurement   # 測量
      - phase_shift   # 相位移位
      - rotation      # 旋轉
    
    # 操作頻率配置
    operation_rates:
      hadamard_ops: 180
      cnot_ops: 240
      measurement_ops: 480
      phase_shift_ops: 265
  
  # 性能配置 / Performance Configuration
  performance:
    enabled: true
    target_throughput_ops_per_sec: 10000
    max_latency_ms: 10
    quantum_efficiency: 0.95
    
  # 監控配置 / Monitoring Configuration
  monitoring:
    enabled: true
    check_interval_seconds: 300
    
    metrics:
      - resource_utilization
      - operation_count
      - cost_per_node
      - quantum_efficiency
      - fault_recovery_rate
  
  # 資源分配優化 / Resource Allocation Optimization
  optimization:
    enabled: true
    dynamic_allocation: true
    auto_scaling: true
    load_balancing: true
    
    # 自動優化參數
    utilization_target: 0.85       # 目標使用率 85%
    overprovisioning_factor: 1.1   # 過度配置係數
  
  # 故障恢復配置 / Fault Recovery Configuration
  fault_recovery:
    enabled: true
    auto_reallocation: true
    backup_pool_percentage: 10  # 備用資源池 10%
    recovery_timeout_ms: 5000
  
  # 日誌配置 / Logging Configuration
  logging:
    enabled: true
    level: "INFO"
    file: "logs/quantum_generation_service.log"
    max_size_mb: 100
    retention_days: 30

# 配置檔案 / Configuration Profiles
profiles:
  conservative:
    description: "保守模式 - 最高可靠性"
    performance.target_throughput_ops_per_sec: 5000
    optimization.utilization_target: 0.70
    optimization.overprovisioning_factor: 1.3
    
  balanced:
    description: "平衡模式 - 標準配置"
    performance.target_throughput_ops_per_sec: 10000
    optimization.utilization_target: 0.85
    optimization.overprovisioning_factor: 1.1
    
  aggressive:
    description: "激進模式 - 最大性能"
    performance.target_throughput_ops_per_sec: 20000
    optimization.utilization_target: 0.95
    optimization.overprovisioning_factor: 0.9
