"""
Trading Configuration Template
交易配置模板

This template defines the configuration structure for Phase 5 trading deployment.
Copy this file to trading_config.yaml and fill in your values.
"""

# ============================================================================
# Phase 5 Trading Configuration
# ============================================================================

# 交易系統名稱
system:
  name: "Cosmic AI Trading System - Phase 5"
  version: "1.0.0"
  phase: 5
  mode: "sandbox"  # Options: sandbox, paper, live
  start_capital: 500  # USD - Starting with $500
  description: "Phase 5 Trading Deployment with Sharpe 3.0+ target"

# ============================================================================
# Environment Settings
# ============================================================================

environment:
  # Python configuration
  python:
    version: "3.12.1"  # Minimum required
    max_workers: 4
    timeout_seconds: 300

  # Logging configuration
  logging:
    level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: "logs/trading_{timestamp}.log"
    console: true
    file_enabled: true

  # Data directories
  directories:
    data: "data/"
    logs: "logs/"
    reports: "reports/"
    backtest: "data/backtest/"
    real_time: "data/real_time/"

# ============================================================================
# API Configuration (SANDBOX)
# ============================================================================

# NOTE: For live trading, update these with real API keys from .env file
exchanges:
  binance:
    enabled: true
    api_key: "${BINANCE_API_KEY}"  # Load from .env
    api_secret: "${BINANCE_API_SECRET}"
    testnet: true  # Use testnet for sandbox
    sandbox: true
    rate_limit_per_minute: 1200

  kraken:
    enabled: true
    api_key: "${KRAKEN_API_KEY}"
    api_secret: "${KRAKEN_API_SECRET}"
    sandbox: true
    rate_limit_per_minute: 600

  coinbase:
    enabled: false
    api_key: "${COINBASE_API_KEY}"
    api_secret: "${COINBASE_API_SECRET}"
    sandbox: true
    rate_limit_per_minute: 300

# ============================================================================
# Hummingbot Configuration
# ============================================================================

hummingbot:
  enabled: true
  mode: "sandbox"  # sandbox, paper, live
  host: "localhost"
  port: 8000
  username: "hummingbot_user"
  password: "${HUMMINGBOT_PASSWORD}"
  
  # Strategy configuration
  strategy:
    type: "arbitrage"  # triangular, wormhole, combined
    max_concurrent_trades: 5
    order_optimization_enabled: true
    
  # Order settings
  orders:
    order_type: "limit"
    time_in_force: "GTC"  # GTC, IOC, FOK
    post_only: true
    
  # Risk management
  risk:
    max_loss_per_trade: 100  # USD
    max_position_size: 1000  # USD
    stop_loss_pct: 2.0  # %
    take_profit_pct: 3.0  # %

# ============================================================================
# Phase 1 - Foundation Layer Configuration
# ============================================================================

phase1:
  enabled: true
  
  # Quantum Verification
  quantum_verification:
    enabled: true
    grover_iterations: 3
    anomaly_threshold: 2.5  # Z-score
    verification_confidence: 0.85
    
  # Market Regime Detection
  market_regime:
    enabled: true
    trend_window: 20
    volatility_window: 30
    regime_threshold: 0.7
    atr_period: 14
    rsi_period: 14
    
  # Theory Optimizer
  theory_optimizer:
    enabled: true
    adaptive_learning_rate: 0.01
    momentum_factor: 0.9
    temperature_initial: 1.0
    temperature_decay: 0.999
    num_theories: 20

# ============================================================================
# Phase 2 - Resonance Breakthrough Layer Configuration
# ============================================================================

phase2:
  enabled: true
  
  # Resonance Detection
  resonance_detection:
    enabled: true
    window_size: 50
    min_confidence: 0.7
    amplification_factor: 1.5
    
  # Multi-Agent Resonance
  multi_agent_resonance:
    enabled: true
    num_agents: 5
    coordination_interval: 60  # seconds
    convergence_threshold: 0.95
    
  # CMA-ES Evolution
  cma_es_evolution:
    enabled: true
    population_size: 20
    num_generations: 50
    mutation_rate: 0.1
    crossover_rate: 0.7

# ============================================================================
# Phase 3 - Singularity Optimization Layer Configuration
# ============================================================================

phase3:
  enabled: true
  
  # Sharpe Target Engine
  sharpe_target:
    enabled: true
    target_sharpe: 3.0
    min_sharpe_acceptable: 2.5
    lookback_window: 252  # Trading days (1 year)
    rebalance_frequency: "daily"
    
  # Dynamic Risk Management
  dynamic_risk:
    enabled: true
    max_drawdown_pct: 10.0
    max_leverage: 2.0
    volatility_adjustment: true
    var_confidence: 0.95
    
  # Singularity Detection
  singularity_detection:
    enabled: true
    anomaly_threshold: 2.0
    min_singularity_strength: 0.8
    detection_window: 20

# ============================================================================
# Phase 4 - Arbitrage Integration Layer Configuration
# ============================================================================

phase4:
  enabled: true
  
  # Triangular Arbitrage
  triangular_arbitrage:
    enabled: true
    min_profit_pct: 0.5  # Minimum 0.5% profit threshold
    max_pairs_monitor: 1000
    cycle_detection_freq: 1  # seconds
    execution_timeout: 5  # seconds
    
  # Wormhole Arbitrage
  wormhole_arbitrage:
    enabled: true
    exchanges: ["binance", "kraken", "coinbase"]  # Monitored exchanges
    min_spread_pct: 0.3  # Minimum 0.3% spread
    max_transfer_time: 3600  # seconds (1 hour)
    blockchains:
      - "ethereum"
      - "bsc"
      - "polygon"
      - "optimism"
      - "arbitrum"
      
  # Hummingbot Integration
  hummingbot_integration:
    enabled: true
    strategy_type: "dual_arbitrage"  # triangular + wormhole
    auto_rebalance: true
    rebalance_frequency: 60  # seconds

# ============================================================================
# Backtesting Configuration
# ============================================================================

backtesting:
  enabled: true
  
  # Data configuration
  data:
    source: "binance"  # Historical data source
    interval: "1h"  # 1m, 5m, 15m, 1h, 4h, 1d
    start_date: "2023-01-01"
    end_date: "2024-12-31"
    
  # Backtest parameters
  parameters:
    initial_capital: 10000  # USD - Use larger amount for backtest
    slippage_pct: 0.1  # 0.1% slippage
    commision_pct: 0.1  # 0.1% commission
    max_positions: 10
    
  # Performance targets
  targets:
    min_sharpe_ratio: 3.0
    min_win_rate: 0.9  # 90%
    max_drawdown: 0.1  # 10%
    min_annual_return: 0.3  # 30%

# ============================================================================
# Sandbox Testing Configuration
# ============================================================================

sandbox_testing:
  enabled: true
  
  # Duration
  duration_days: 7
  warm_up_days: 1
  
  # Monitoring
  monitoring:
    update_frequency: 60  # seconds
    alert_on_errors: true
    performance_check_frequency: 3600  # seconds (1 hour)
    
  # Exit conditions
  exit_conditions:
    max_consecutive_losses: 5
    max_daily_loss_pct: 5.0
    stop_on_critical_error: true

# ============================================================================
# Live Trading Configuration
# ============================================================================

live_trading:
  enabled: false  # Only enable when ready
  
  # Capital management
  capital:
    initial: 500  # USD
    max_per_trade: 100  # USD
    position_sizing: "dynamic"  # static, dynamic
    
  # Growth strategy
  growth:
    reinvest_profits: true
    capital_increase_threshold: 0.2  # Increase when up 20%
    max_capital: 50000  # USD - Stop increasing at this level
    
  # Operational parameters
  operations:
    trading_hours: "24/7"  # 24/7, business_hours, custom
    auto_shutdown_on_loss: -500  # USD - Shutdown if loss exceeds this
    daily_profit_target: 50  # USD
    daily_stop_loss: -200  # USD

# ============================================================================
# Monitoring & Alerting Configuration
# ============================================================================

monitoring:
  enabled: true
  
  # Real-time monitoring
  real_time:
    enabled: true
    update_frequency: 60  # seconds
    metrics_to_track:
      - "portfolio_value"
      - "daily_pnl"
      - "win_rate"
      - "sharpe_ratio"
      - "max_drawdown"
      - "active_positions"
      
  # Alerting
  alerts:
    enabled: true
    channels:
      - "console"
      - "file"
      - "email"  # Optional: requires SMTP config
      
    alert_conditions:
      - type: "large_loss"
        threshold: -500  # USD
        severity: "critical"
        
      - type: "low_performance"
        threshold: 1.5  # Sharpe ratio
        severity: "warning"
        
      - type: "high_drawdown"
        threshold: 0.15  # 15%
        severity: "warning"
        
      - type: "system_error"
        threshold: "any"
        severity: "critical"
        
  # Reporting
  reporting:
    enabled: true
    frequency: "daily"  # daily, weekly, monthly
    formats: ["html", "csv", "json"]
    email_recipients: []  # Add email addresses if needed

# ============================================================================
# Performance Metrics Configuration
# ============================================================================

metrics:
  calculation_interval: 3600  # seconds (1 hour)
  
  # Metrics to track
  sharpe_ratio:
    lookback_window: 252  # Trading days
    risk_free_rate: 0.05  # 5% annual
    
  sortino_ratio:
    lookback_window: 252
    risk_free_rate: 0.05
    
  max_drawdown:
    lookback_window: 252
    
  win_rate:
    lookback_window: 100  # Last 100 trades
    
  profit_factor:
    lookback_window: 100  # Last 100 trades

# ============================================================================
# System Optimization Parameters
# ============================================================================

optimization:
  # Parameter tuning
  auto_tuning: true
  tuning_frequency: 86400  # seconds (daily)
  
  # Performance optimization
  cache_enabled: true
  cache_size_mb: 100
  
  # Parallel processing
  parallel_processing: true
  num_workers: 4

# ============================================================================
# End of Configuration
# ============================================================================
