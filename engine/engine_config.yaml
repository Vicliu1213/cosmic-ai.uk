# Quantum Analysis Engine Configuration
version: "1.0"
description: "Configuration for Comic AI Quantum Analysis Engine"

# Core Settings
engine:
  name: "Quantum Analysis Engine"
  version: "2.0.0"
  
# Theories Configuration
theories:
  heisenberg:
    enabled: true
    precision_threshold: 1e-6
    max_iterations: 1000
    convergence_criterion: 1e-8
    
  bekenstein:
    enabled: true
    max_storage_density: 1e15
    compression_ratio: 100
    memory_limit: "16GB"
    
  bremermann:
    enabled: true
    max_computation_rate: 1e20
    processing_cores: 8
    cache_size: "2GB"
    
  landauer:
    enabled: true
    min_energy_threshold: 1e-21
    temperature: 300  # Kelvin
    efficiency_factor: 0.95

# Analysis Parameters
analysis:
  stage1:
    population_size: 50
    generations: 100
    mutation_rate: 0.1
    crossover_rate: 0.8
    elite_size: 2
    
  optimization:
    algorithm: "differential_evolution"
    tolerance: 1e-6
    max_evaluations: 10000
    
# Output Settings
output:
  format: ["json", "csv", "html"]
  save_intermediate: true
  generate_plots: true
  plot_dpi: 300
  
# Logging
logging:
  level: "INFO"
  file: "logs/engine.log"
  max_size: "10MB"
  backup_count: 5