# Dashboard Configuration
name: "Comic AI Dashboard"
version: "1.0.0"

# Server Settings
server:
  host: "0.0.0.0"
  port: 8443
  debug: false
  auto_reload: true
  ssl:
    enabled: true
    cert: "ssl_certs/cert.pem"
    key: "ssl_certs/key.pem"

# Database Configuration
database:
  type: "sqlite"
  path: "data/dashboard.db"
  
# Redis Configuration (for caching)
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: null
  
# Authentication
auth:
  enabled: false
  session_timeout: 3600
  
# Features
features:
  real_time_updates: true
  data_visualization: true
  export_formats: ["pdf", "csv", "json"]
  max_file_size: "50MB"
  
# UI Settings
ui:
  theme: "dark"
  language: "zh-TW"
  refresh_interval: 5  # seconds
  
# API Configuration
api:
  rate_limit: 100  # requests per minute
  timeout: 30  # seconds
  cors_enabled: true