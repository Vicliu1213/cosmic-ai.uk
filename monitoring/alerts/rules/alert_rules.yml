groups:
  - name: cosmic_ai_alerts
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: system_cpu_usage > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}%"

      - alert: HighMemoryUsage
        expr: system_memory_usage > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}%"

      - alert: ServiceDown
        expr: app_health_status != 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "Cosmic AI service is not responding"

      - alert: HighErrorRate
        expr: rate(app_errors_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate"
          description: "Error rate is {{ $value }}"

      - alert: TradeFailure
        expr: trading_failed_trades_total > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Multiple trade failures"
          description: "{{ $value }} trades have failed"

      - alert: HighDrawdown
        expr: trading_max_drawdown > 10
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "High portfolio drawdown"
          description: "Maximum drawdown is {{ $value }}%"
