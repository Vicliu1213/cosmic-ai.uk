global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'cosmic-ai-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'cosmic-ai'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'database'
    static_configs:
      - targets: ['localhost:5432']
