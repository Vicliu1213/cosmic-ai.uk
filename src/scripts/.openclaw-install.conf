# OpenClaw 安装配置文件
# 这个文件定义了 OpenClaw 安装的默认配置

# 版本配置
OPENCLAW_VERSION=${OPENCLAW_VERSION:-latest}
OPENCLAW_BETA=${OPENCLAW_BETA:-0}

# 安装方法：npm 或 git
INSTALL_METHOD=${OPENCLAW_INSTALL_METHOD:-npm}

# Git 检出配置（如果使用 git 方法）
GIT_DIR=${OPENCLAW_GIT_DIR:-$HOME/openclaw}
GIT_UPDATE=${OPENCLAW_GIT_UPDATE:-1}

# 交互配置
NO_PROMPT=${OPENCLAW_NO_PROMPT:-0}
NO_ONBOARD=${OPENCLAW_NO_ONBOARD:-0}

# 调试和输出
VERBOSE=${OPENCLAW_VERBOSE:-0}
DRY_RUN=${OPENCLAW_DRY_RUN:-0}
NPM_LOGLEVEL=${OPENCLAW_NPM_LOGLEVEL:-error}

# npm 全局 bin 目录
NPM_GLOBAL_BIN=$(npm root -g 2>/dev/null | sed 's/\/node_modules$/\/bin/' || echo "$HOME/.npm-global/bin")

# 深层依赖配置
SHARP_IGNORE_GLOBAL_LIBVIPS=${SHARP_IGNORE_GLOBAL_LIBVIPS:-1}

# 节点和包管理器版本要求
REQUIRED_NODE_VERSION=20
REQUIRED_NPM_VERSION=9

# 在此设置自定义安装路径
# OPENCLAW_CUSTOM_PATH="/path/to/custom/install"

# 在此添加额外的 npm 标志
# EXTRA_NPM_FLAGS="--no-save"
