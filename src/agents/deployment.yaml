# Deployment Configuration
version: "1.0.0"
description: "Deployment configuration for Comic AI System"

# Environment Configurations
environments:
  development:
    host: "localhost"
    port: 8080
    ssl: false
    debug: true
    database:
      type: "sqlite"
      path: "data/dev.db"
    redis:
      host: "localhost"
      port: 6379
      db: 0
    logging:
      level: "DEBUG"
      file: "logs/dev.log"
      
  staging:
    host: "staging.comic-ai.com"
    port: 443
    ssl: true
    debug: false
    database:
      type: "postgresql"
      host: "staging-db.comic-ai.com"
      port: 5432
      name: "comic_ai_staging"
    redis:
      host: "staging-redis.comic-ai.com"
      port: 6379
      db: 1
    logging:
      level: "INFO"
      file: "logs/staging.log"
      
  production:
    host: "comic-ai.com"
    port: 443
    ssl: true
    debug: false
    database:
      type: "postgresql"
      host: "prod-db.comic-ai.com"
      port: 5432
      name: "comic_ai_prod"
    redis:
      host: "prod-redis.comic-ai.com"
      port: 6379
      db: 0
    logging:
      level: "WARNING"
      file: "logs/prod.log"

# Deployment Strategy
deployment_strategy: "blue_green"
health_check_endpoint: "/api/status"
rollback_timeout: 300

# Container Configuration
containers:
  app:
    image: "comic-ai:latest"
    replicas: 2
    resources:
      memory: "2Gi"
      cpu: "1000m"
    environment:
      - NODE_ENV=production
      - PORT=8080
    health_check:
      path: "/api/health"
      interval: 30
      timeout: 10
      retries: 3
      
  database:
    image: "postgres:15"
    resources:
      memory: "4Gi"
      cpu: "2000m"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=comic_ai
      - POSTGRES_USER=comic_user
      - POSTGRES_PASSWORD=secure_password
      
  redis:
    image: "redis:alpine"
    resources:
      memory: "1Gi"
      cpu: "500m"
    volumes:
      - redis_data:/data
      
  nginx:
    image: "nginx:alpine"
    resources:
      memory: "512Mi"
      cpu: "250m"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/ssl

# Scaling Configuration
scaling:
  min_replicas: 2
  max_replicas: 10
  target_cpu_utilization: 70
  target_memory_utilization: 80
  
  # Auto-scaling triggers
  triggers:
    - type: "cpu"
      threshold: 70
      period: 300
    - type: "memory"
      threshold: 80
      period: 300
    - type: "request_rate"
      threshold: 1000  # requests/minute
      period: 120

# Security Configuration
security:
  ssl:
    enabled: true
    cert_path: "/etc/ssl/cert.pem"
    key_path: "/etc/ssl/key.pem"
    
  authentication:
    enabled: true
    methods: ["jwt", "oauth2"]
    session_timeout: 3600
    
  network:
    allowed_ips: ["0.0.0.0/0"]
    firewall_enabled: true
    
  secrets:
    - name: "DATABASE_PASSWORD"
      source: "vault"
      path: "secret/data/db_password"
    - name: "JWT_SECRET"
      source: "vault"
      path: "secret/data/jwt_secret"

# Monitoring and Observability
monitoring:
  prometheus:
    enabled: true
    port: 9090
    retention: "30d"
    
  grafana:
    enabled: true
    port: 3000
    dashboards: ["system", "application", "quantum_analysis"]
    
  alerts:
    enabled: true
    channels: ["email", "slack"]
    rules:
      - name: "High CPU Usage"
        condition: "cpu_usage > 80"
        duration: "5m"
      - name: "High Memory Usage"
        condition: "memory_usage > 85"
        duration: "5m"
      - name: "Service Down"
        condition: "up == 0"
        duration: "1m"

# Backup Configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 30  # days
  destinations:
    - type: "s3"
      bucket: "comic-ai-backups"
      path: "production/"
    - type: "local"
      path: "/backups/"
      
  backup_types:
    - database: true
    - logs: true
    - config: true
    - uploads: false

# Performance Optimization
performance:
  caching:
    enabled: true
    type: "redis"
    ttl: 3600
    
  cdn:
    enabled: true
    provider: "cloudflare"
    cache_ttl: 86400
    
  compression:
    enabled: true
    types: ["text", "json", "css", "js"]
    level: 6

# Testing and Validation
testing:
  integration_tests:
    enabled: true
    command: "pytest tests/integration/"
    timeout: 300
    
  load_tests:
    enabled: true
    command: "k6 run tests/load/k6.js"
    timeout: 600
    threshold:
      - metric: "http_req_duration"
        threshold: 500  # ms
        
  security_tests:
    enabled: true
    command: "owasp-zap-baseline.py"
    timeout: 300

# Feature Flags
features:
  quantum_analysis: true
  immune_system: true
  intelligent_agents: true
  bio_evolution: false  # To be enabled
  auto_scaling: true
  advanced_monitoring: true