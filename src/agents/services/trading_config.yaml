# 奇點共振突破交易系統配置
version: "2.0.0"
description: "Singularity Resonance Breakthrough Trading System Configuration"

# 交易系統核心配置
trading_system:
  max_positions: 15
  risk_per_trade: 0.02  # 每筆交易風險百分比
  max_daily_risk: 0.10   # 每日最大風險
  quantum_threshold: 0.80  # 量子信號閾值
  resonance_multiplier: 1.5  # 共振倍數
  
  # 支持的交易對
  symbols:
    - "BTC/USDT"
    - "ETH/USDT" 
    - "SOL/USDT"
    - "AAPL"
    - "GOOGL"
    - "TSLA"
    - "MSFT"
    - "NVDA"

# 量子增強配置
quantum_config:
  coherence_threshold: 0.85
  entanglement_depth: 4
  superposition_states: 8
  decoherence_rate: 0.01
  
  # 量子計算參數
  quantum_gates: 50
  circuit_depth: 100
  measurement_frequency: 1000  # Hz
  
  # 量子記憶體
  quantum_ram_size: "2GB"
  coherence_time: 15000  # milliseconds

# Semantic Kernel 配置
semantic_kernel:
  # AI 模型配置
  model:
    provider: "azure_openai"  # 或 "openai"
    deployment_name: "gpt-4-turbo"
    api_version: "2024-02-15-preview"
    max_tokens: 2000
    temperature: 0.3
    
  # 智能體配置
  agents:
    technical_analyst:
      name: "TechnicalAnalyst"
      role: "技術分析專家"
      capabilities:
        - "技術指標分析"
        - "圖表模式識別" 
        - "價格預測"
        
    fundamental_analyst:
      name: "FundamentalAnalyst"
      role: "基本面分析專家"
      capabilities:
        - "財務報表分析"
        - "經濟指標評估"
        - "行業趨勢分析"
        
    risk_manager:
      name: "RiskManager"
      role: "風險管理專家"
      capabilities:
        - "風險評估"
        - "倉位管理"
        - "止損止盈策略"

# 本地量子智能體配置
local_agents:
  system:
    max_agents: 25
    message_ttl: 3600
    communication_protocol: "quantum_entangled"
    synchronization_interval: 1000
    
  # 專門化交易智能體
  trading_agents:
    quantum_analyst:
      count: 3
      priority: "high"
      capabilities:
        - "量子優勢分析"
        - "市場共振檢測"
        - "奇點預測"
        
    data_optimizer:
      count: 2  
      priority: "medium"
      capabilities:
        - "實時數據壓縮"
        - "存儲優化"
        - "訪問模式分析"
        
    risk_monitor:
      count: 4
      priority: "critical"
      capabilities:
        - "實時風險監控"
        - "異常檢測"
        - "健康評估"

# 交易策略配置
strategies:
  quantum_momentum:
    description: "量子動量策略"
    parameters:
      momentum_threshold: 0.75
      quantum_confirmation: true
      exit_threshold: 0.3
      
  sentiment_reversal:
    description: "情緒反轉策略" 
    parameters:
      sentiment_threshold: 0.2
      reversal_confirmation: 0.8
      holding_period: 24  # hours
      
  volatility_breakout:
    description: "波動率突破策略"
    parameters:
      volatility_threshold: 0.05
      breakout_confirmation: true
      trailing_stop: 0.02

# 風險管理配置
risk_management:
  # 單筆交易風險
  per_trade:
    max_risk_percent: 2.0
    max_position_size: 100000
    stop_loss_distance: 2.0
    
  # 投資組合風險
  portfolio:
    max_drawdown: 15.0
    var_confidence: 0.95
    correlation_limit: 0.7
    
  # 量子風險控制
  quantum_risk:
    coherence_min: 0.7
    entanglement_max: 0.9
    decoherence_alert: 0.3

# 性能優化配置
optimization:
  # 負載均衡
  load_balancing:
    algorithm: "quantum_aware"
    redistribution_threshold: 0.8
    hot_agent_detection: true
    
  # 緩存策略
  caching:
    quantum_cache_size: "512MB"
    classical_cache_size: "1GB" 
    cache_hit_target: 0.85
    
  # 資源管理
  resource_management:
    auto_scaling: true
    resource_prediction: true
    quantum_optimization: true

# 監控與日誌配置
monitoring:
  # 日誌級別
  logging:
    level: "INFO"
    file: "logs/trading_system.log"
    max_size: "500MB"
    backup_count: 20
    
  # 性能指標
  metrics:
    collection_interval: 1000  # ms
    retention_period: 86400     # seconds
    export_format: "prometheus"
    
  # 告警配置
  alerts:
    enabled: true
    channels:
      - "email"
      - "slack"
      - "telegram"
    thresholds:
      drawdown: 0.10
      quantum_decoherence: 0.5
      agent_failure: 3

# 開發與測試配置
development:
  debug_mode: false
  test_environment: true
  simulation_mode: true
  
  # 測試參數
  testing:
    backtest_period: 365  # days
    monte_carlo_runs: 1000
    confidence_level: 0.95
    
  # 模擬配置
  simulation:
    real_time_factor: 100  # 100x speed
    market_noise: 0.01
    quantum_effects: true

# 集成配置
integrations:
  # 數據源
  data_sources:
    crypto:
      - "binance"
      - "coinbase"
      - "kraken"
    stocks:
      - "yahoo_finance"
      - "alpha_vantage"
      - "polygon"
      
  # 券商接口
  brokers:
    crypto:
      - "binance_futures"
      - "bybit"
      - "okx"
    stocks:
      - "interactive_brokers"
      - "alpaca"
      - "robinhood"
      
  # 通知服務
  notifications:
    email:
      provider: "smtp"
      server: "smtp.gmail.com"
      port: 587
    slack:
      webhook_url: "${SLACK_WEBHOOK_URL}"
    telegram:
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      chat_id: "${TELEGRAM_CHAT_ID}"

# 安全配置
security:
  # API 密鑰管理
  api_keys:
    encryption: true
    rotation_interval: 86400  # seconds
    backup_enabled: true
    
  # 訪問控制
  access_control:
    authentication: true
    authorization: true
    audit_logging: true
    
  # 量子安全
  quantum_security:
    quantum_key_distribution: true
    post_quantum_crypto: true
    quantum_resistant_signatures: true