# 報告配置檔案 (Report Configuration)
# 報告生成 - CSV 格式自訂項目

logging:
  version: 1
  disable_existing_loggers: false
  
  formatters:
    standard:
      format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    json:
      format: '%(message)s'
    detailed:
      format: '%(asctime)s - [%(levelname)s] - %(name)s - %(funcName)s:%(lineno)d - %(message)s'
  
  handlers:
    console:
      class: logging.StreamHandler
      level: INFO
      formatter: standard
      stream: ext://sys.stdout
    
    file_debug:
      class: logging.handlers.RotatingFileHandler
      filename: logs/debug.log
      maxBytes: 10485760  # 10MB
      backupCount: 5
      level: DEBUG
      formatter: detailed
    
    file_info:
      class: logging.handlers.RotatingFileHandler
      filename: logs/info.log
      maxBytes: 10485760
      backupCount: 5
      level: INFO
      formatter: standard
    
    file_trading:
      class: logging.handlers.RotatingFileHandler
      filename: logs/trading.log
      maxBytes: 20971520  # 20MB
      backupCount: 10
      level: DEBUG
      formatter: detailed
  
  loggers:
    trading:
      level: DEBUG
      handlers: [console, file_trading]
      propagate: false
    
    system:
      level: INFO
      handlers: [console, file_info]
      propagate: false
    
    api:
      level: DEBUG
      handlers: [console, file_debug]
      propagate: false
  
  root:
    level: INFO
    handlers: [console, file_info]


# 回測報告配置
backtest_report:
  output_dir: reports/backtest
  
  # 必看項目（精簡版）
  default_columns:
    - strategy_name        # 策略名稱
    - symbol              # 交易對
    - total_return        # 總回報 (%)
    - annual_return       # 年化回報 (%)
    - sharpe_ratio        # 夏普比率
    - max_drawdown        # 最大回撤 (%)
    - win_rate            # 勝率 (%)
    - total_trades        # 總交易數
    - profit_factor       # 利潤因子
  
  # 完整項目（詳細版）
  extended_columns:
    - strategy_name
    - symbol
    - start_date
    - end_date
    - total_return
    - annual_return
    - sharpe_ratio
    - max_drawdown
    - win_rate
    - total_trades
    - winning_trades
    - losing_trades
    - avg_win
    - avg_loss
    - profit_factor
    - best_trade
    - worst_trade
  
  # 報告格式
  format: csv  # csv | json | excel
  
  # 自動摘要
  add_summary: true
  
  # 排序方式
  sort_by: total_return  # total_return | sharpe_ratio | win_rate
  sort_order: descending  # ascending | descending


# 日常報告配置
daily_report:
  output_dir: reports/daily
  
  # 必看項目（簡潔版）
  default_columns:
    - date                # 日期
    - symbol              # 交易對
    - close_price         # 收盤價
    - daily_return        # 日回報 (%)
    - trades_count        # 交易數
    - win_rate            # 勝率 (%)
    - realized_pnl        # 已實現損益
    - total_pnl           # 總損益
  
  # 完整項目（詳細版）
  extended_columns:
    - date
    - symbol
    - open_price
    - high_price
    - low_price
    - close_price
    - volume
    - trades_count
    - wins
    - losses
    - win_rate
    - daily_return
    - realized_pnl
    - unrealized_pnl
    - total_pnl
  
  # 報告格式
  format: csv  # csv | json
  
  # 追加到追蹤檔案
  tracking_file: daily_tracking.csv
  
  # 投資組合報告
  generate_portfolio: true
  
  # 自動生成摘要
  auto_summary: true


# 日誌查詢配置
log_query:
  log_dir: logs
  
  # 預設搜索限制
  default_limit: 100
  
  # 保留日誌天數
  retention_days: 30
  
  # 歸檔設置
  archive:
    enabled: true
    after_days: 7
    compress: true
    archive_dir: logs/archive


# 雲端日誌配置（可選）
cloud_logging:
  # Azure Monitor
  azure:
    enabled: false
    workspace_id: ${AZURE_LOG_WORKSPACE_ID}
    workspace_key: ${AZURE_LOG_WORKSPACE_KEY}
    log_type: ComicAITrading
  
  # AWS CloudWatch
  aws:
    enabled: false
    region: us-east-1
    log_group: /comic-ai/trading
    log_stream: trading
  
  # GCP Cloud Logging
  gcp:
    enabled: false
    project_id: ${GCP_PROJECT_ID}
    log_name: projects/${GCP_PROJECT_ID}/logs/comic-ai-trading
  
  # ELK Stack（本地/遠程）
  elk:
    enabled: false
    elasticsearch_host: localhost
    elasticsearch_port: 9200
    elasticsearch_index: comic-ai-{date}
    kibana_url: http://localhost:5601


# 報告發送配置
report_delivery:
  # 電子郵件
  email:
    enabled: false
    smtp_server: smtp.gmail.com
    smtp_port: 587
    from_email: ${REPORT_FROM_EMAIL}
    password: ${REPORT_EMAIL_PASSWORD}
    recipients:
      - admin@example.com
    
    # 發送時間表
    schedule:
      backtest: "weekly"      # weekly | monthly | on_demand
      daily: "daily"          # daily | weekly | on_demand
      time: "08:00"           # HH:MM UTC
  
  # S3/GCS 存儲
  cloud_storage:
    enabled: false
    provider: s3  # s3 | gcs | azure_blob
    bucket: comic-ai-reports
    prefix: reports/
    retention_days: 90


# 報告通知配置
report_notifications:
  # Slack 通知
  slack:
    enabled: false
    webhook_url: ${SLACK_WEBHOOK_URL}
    channel: "#trading-reports"
    notify_on:
      - backtest_complete
      - daily_summary
      - alert_threshold_exceeded
  
  # 本地檔案通知
  file_notification:
    enabled: true
    file: reports/notifications.log
