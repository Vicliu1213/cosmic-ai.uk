# 免疫重構引擎配置
# Immune Reconfiguration Engine Configuration

immune_reconfig:
  # 免疫系統配置 / Immune System Configuration
  immune_system:
    enabled: true
    
    # 免疫細胞類型 / Immune Cell Types
    cell_types:
      t_cell:
        enabled: true
        count: [5, 100]
        base_strength: [0.5, 0.9]
        activation_threshold: [0.5, 0.95]
        
      b_cell:
        enabled: true
        count: [5, 100]
        base_strength: [0.4, 0.8]
        activation_threshold: [0.5, 0.95]
        
      nk_cell:
        enabled: true
        count: [5, 100]
        base_strength: [0.6, 0.95]
        activation_threshold: [0.5, 0.95]
        
    # 免疫反應 / Immune Response
    response:
      enabled: true
      response_threshold: [0.5, 0.99]
      response_time_seconds: [0.1, 60]
      
    # 免疫記憶 / Immune Memory
    memory:
      enabled: true
      memory_decay: [0.8, 0.99]
      memory_size_limit: [100, 10000]
      
    # 適應率 / Adaptation Rate
    adaptation_rate: [0.01, 0.5]
    
  # 抗原模式配置 / Antigen Pattern Configuration
  antigen_patterns:
    enabled: true
    
    # 異常檢測 / Anomaly Detection
    anomaly_detection:
      enabled: true
      detection_methods:
        - "statistical"
        - "machine_learning"
        - "rule_based"
        
    # 威脅等級 / Threat Level
    threat_levels:
      enabled: true
      range: [0.0, 1.0]
      
    # 抗原類別 / Antigen Categories
    categories:
      - "anomaly"
      - "error"
      - "inefficiency"
      - "security_threat"
      
    # 簽名存儲 / Signature Storage
    signature_storage:
      enabled: true
      max_signatures: [100, 100000]
      
  # 異常檢測配置 / Anomaly Detection Configuration
  anomaly_detection:
    enabled: true
    
    # 性能異常 / Performance Anomaly
    performance:
      enabled: true
      cpu_threshold: [0.7, 1.0]
      memory_threshold: [0.7, 1.0]
      latency_threshold: [100, 10000]  # ms
      
    # 行為異常 / Behavior Anomaly
    behavior:
      enabled: true
      baseline_window_hours: [1, 168]
      deviation_threshold: [2.0, 5.0]  # sigmas
      
    # 安全異常 / Security Anomaly
    security:
      enabled: true
      unauthorized_access_alert: true
      suspicious_pattern_threshold: [0.5, 0.99]
      
  # 量子增強配置 / Quantum Enhancement Configuration
  quantum_enhancement:
    enabled: true
    
    # 相干性閾值 / Coherence Threshold
    coherence_threshold: [0.7, 0.99]
    
    # 糾纏深度 / Entanglement Depth
    entanglement_depth: [1, 16]
    
    # 疊加態數量 / Superposition States
    superposition_states: [2, 256]
    
    # 量子修正 / Quantum Correction
    quantum_correction: true
    
  # 重構機制配置 / Reconfiguration Mechanism Configuration
  reconfiguration:
    enabled: true
    
    # 自動重構 / Auto Reconfiguration
    auto_reconfiguration: true
    trigger_threshold: [0.7, 1.0]
    
    # 重構策略 / Reconfiguration Strategy
    strategies:
      - "isolation"
      - "repair"
      - "replacement"
      - "optimization"
      
    # 重構時間 / Reconfiguration Time
    time_limit_seconds: [1, 300]
    
    # 驗證 / Verification
    verification:
      enabled: true
      verification_method: "comprehensive"  # quick, comprehensive
      
  # 自我修復配置 / Self-Healing Configuration
  self_healing:
    enabled: true
    
    # 修復策略 / Healing Strategy
    strategies:
      enabled: true
      local_repair: true
      global_repair: true
      
    # 修復速度 / Healing Speed
    speed: [0.1, 10.0]  # multiplier
    
    # 修復資源 / Healing Resources
    resource_allocation: "adaptive"  # fixed, adaptive
    
  # 進化機制配置 / Evolution Mechanism Configuration
  evolution:
    enabled: true
    
    # 進化策略 / Evolution Strategy
    strategy: "genetic"  # genetic, particle_swarm, differential_evolution
    
    # 種群大小 / Population Size
    population_size: [10, 1000]
    
    # 代數 / Generations
    generations: [10, 10000]
    
    # 交叉率 / Crossover Rate
    crossover_rate: [0.5, 0.99]
    
    # 變異率 / Mutation Rate
    mutation_rate: [0.01, 0.5]
    
  # 監測與報告配置 / Monitoring and Reporting Configuration
  monitoring:
    enabled: true
    
    # 實時監測 / Real-time Monitoring
    realtime:
      enabled: true
      monitoring_interval_seconds: [1, 60]
      
    # 健康指標 / Health Metrics
    health_metrics:
      enabled: true
      track_cell_count: true
      track_antigen_count: true
      track_response_time: true
      
    # 報告 / Reporting
    reporting:
      enabled: true
      format: "json"
      frequency: "hourly"  # hourly, daily, on_demand
      
  # 性能配置 / Performance Configuration
  performance:
    enabled: true
    
    # 並行處理 / Parallel Processing
    parallel:
      enabled: true
      max_workers: [1, 32]
      
    # 快取 / Caching
    caching:
      enabled: true
      cache_ttl_seconds: [60, 3600]

# 配置檔案 / Configuration Profiles
profiles:
  conservative:
    description: "保守模式"
    immune_system.cell_types.t_cell.count: 10
    immune_system.response_threshold: 0.9
    anomaly_detection.performance.cpu_threshold: 0.9
    evolution.generations: 100
    
  balanced:
    description: "平衡模式"
    immune_system.cell_types.t_cell.count: 50
    immune_system.response_threshold: 0.8
    anomaly_detection.performance.cpu_threshold: 0.8
    evolution.generations: 1000
    
  aggressive:
    description: "激進模式"
    immune_system.cell_types.t_cell.count: 100
    immune_system.response_threshold: 0.7
    anomaly_detection.performance.cpu_threshold: 0.7
    quantum_enhancement.enabled: true
    evolution.generations: 10000
