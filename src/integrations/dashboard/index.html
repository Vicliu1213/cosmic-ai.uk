<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM-TradeBot Cosmic Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            background: rgba(48, 43, 99, 0.8);
            border-bottom: 2px solid #00d4ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
        }

        h1 {
            color: #00d4ff;
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(48, 43, 99, 0.6);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
            transform: translateY(-2px);
        }

        .card-title {
            color: #00d4ff;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #00d4ff;
            padding-bottom: 10px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .metric {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #00d4ff;
        }

        .metric-label {
            font-size: 12px;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 18px;
            color: #00ff00;
            font-weight: bold;
        }

        .metric-value.negative {
            color: #ff6b6b;
        }

        .agent-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .agent-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #00d4ff;
            border-radius: 6px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .agent-card.running {
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .agent-card.error {
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.3);
        }

        .agent-name {
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .agent-status {
            font-size: 12px;
            color: #a0a0a0;
        }

        .signal-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .signal-item {
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid #00d4ff;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .signal-item.buy {
            border-left-color: #00ff00;
        }

        .signal-item.sell {
            border-left-color: #ff6b6b;
        }

        .control-panel {
            background: rgba(48, 43, 99, 0.6);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button.danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #cc3333 100%);
        }

        button.warning {
            background: linear-gradient(135deg, #ffa500 0%, #cc8800 100%);
        }

        .chart-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        .info-text {
            font-size: 12px;
            color: #a0a0a0;
            margin-top: 10px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 20px;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        .scroll-bar::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-bar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .scroll-bar::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 10px;
        }

        .scroll-bar::-webkit-scrollbar-thumb:hover {
            background: #00ffff;
        }

        .signal-list {
            scroll-behavior: smooth;
        }

        .signal-list.scroll-bar {
            scrollbar-color: #00d4ff rgba(0, 0, 0, 0.3);
        }

        .toast-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 212, 255, 0.9);
            color: #fff;
            padding: 15px 20px;
            border-radius: 4px;
            max-width: 300px;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .update-time {
            font-size: 11px;
            color: #888;
            margin-top: 10px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <span class="status-indicator"></span>
                LLM-TradeBot Cosmic Panel
            </h1>
            <p>實時交易監控和控制面板</p>
        </header>

        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="card-title">系統控制</div>
            <div class="button-group">
                <button onclick="startSystem()">▶ 開始交易</button>
                <button onclick="pauseSystem()" class="warning">⏸ 暫停</button>
                <button onclick="stopSystem()" class="danger">⏹ 停止</button>
                <button onclick="resetSystem()" class="warning">🔄 重置</button>
                <button onclick="refreshData()">🔃 刷新數據</button>
            </div>
        </div>

        <!-- 主儀表板 -->
        <div class="dashboard-grid">
            <!-- 交易指標 -->
            <div class="card">
                <div class="card-title">📊 交易指標</div>
                <div class="metrics-grid">
                    <div class="metric">
                        <div class="metric-label">總交易數</div>
                        <div class="metric-value" id="totalTrades">0</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">勝率</div>
                        <div class="metric-value" id="winRate">0%</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">總 PnL</div>
                        <div class="metric-value" id="totalPnL">$0.00</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Sharpe 比率</div>
                        <div class="metric-value" id="sharpeRatio">0.00</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">最大回撤</div>
                        <div class="metric-value negative" id="maxDrawdown">0%</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">當前餘額</div>
                        <div class="metric-value" id="currentBalance">$10,000.00</div>
                    </div>
                </div>
                <div class="update-time" id="metricsUpdateTime">最後更新：--:--:--</div>
            </div>

            <!-- 代理狀態 -->
            <div class="card">
                <div class="card-title">🤖 代理狀態</div>
                <div class="agent-container" id="agentContainer">
                    <!-- 動態生成 -->
                </div>
                <div class="update-time" id="agentsUpdateTime">最後更新：--:--:--</div>
            </div>

            <!-- 最近信號 -->
            <div class="card full-width">
                <div class="card-title">📡 Cosmic 系統信號</div>
                <div class="signal-list scroll-bar" id="signalList">
                    <div class="info-text">等待信號...</div>
                </div>
                <div class="update-time" id="signalsUpdateTime">最後更新：--:--:--</div>
            </div>
        </div>
    </div>

    <script>
        // WebSocket 連接
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${window.location.host}/ws/live-updates`;
        let ws = null;

        function connectWebSocket() {
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = function() {
                    console.log('WebSocket 已連接');
                    showNotification('系統已連接', 'success');
                };
                
                ws.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket 錯誤:', error);
                    showNotification('連接錯誤', 'error');
                };
                
                ws.onclose = function() {
                    console.log('WebSocket 已斷開');
                    // 5 秒後嘗試重連
                    setTimeout(connectWebSocket, 5000);
                };
            } catch (e) {
                console.error('WebSocket 連接失敗:', e);
            }
        }

        function handleMessage(data) {
            if (data.type === 'metrics_update') {
                updateMetrics(data.data);
            } else if (data.type === 'cosmic_signal') {
                addSignal(data.data);
            } else if (data.type === 'agent_update') {
                updateAgent(data.data);
            }
        }

        function updateMetrics(metrics) {
            document.getElementById('totalTrades').textContent = metrics.total_trades || 0;
            document.getElementById('winRate').textContent = ((metrics.win_rate || 0) * 100).toFixed(1) + '%';
            document.getElementById('totalPnL').textContent = '$' + (metrics.total_pnl || 0).toFixed(2);
            document.getElementById('sharpeRatio').textContent = (metrics.sharpe_ratio || 0).toFixed(2);
            document.getElementById('maxDrawdown').textContent = ((metrics.max_drawdown || 0) * 100).toFixed(1) + '%';
            document.getElementById('currentBalance').textContent = '$' + (metrics.current_balance || 10000).toFixed(2);
            
            updateTime('metricsUpdateTime');
        }

        function addSignal(signal) {
            const signalList = document.getElementById('signalList');
            if (signalList.innerHTML === '<div class="info-text">等待信號...</div>') {
                signalList.innerHTML = '';
            }

            const signalElement = document.createElement('div');
            signalElement.className = `signal-item ${signal.signal_type.toLowerCase()}`;
            signalElement.innerHTML = `
                <strong>${signal.symbol}</strong> - ${signal.signal_type}
                <br>Sharpe: ${signal.sharpe_ratio.toFixed(2)} | 信心: ${(signal.confidence * 100).toFixed(0)}%
                <br><small>${new Date(signal.timestamp).toLocaleTimeString('zh-Hant')}</small>
            `;

            signalList.insertBefore(signalElement, signalList.firstChild);

            // 保持最多 50 個信號
            while (signalList.children.length > 50) {
                signalList.removeChild(signalList.lastChild);
            }

            updateTime('signalsUpdateTime');
        }

        function updateAgent(agent) {
            let agentElement = document.getElementById(`agent-${agent.agent_name}`);
            if (!agentElement) {
                agentElement = document.createElement('div');
                agentElement.id = `agent-${agent.agent_name}`;
                document.getElementById('agentContainer').appendChild(agentElement);
            }

            const statusClass = agent.status === 'running' ? 'running' : agent.status === 'error' ? 'error' : '';
            agentElement.className = `agent-card ${statusClass}`;
            agentElement.innerHTML = `
                <div class="agent-name">${agent.agent_name}</div>
                <div class="agent-status">
                    狀態: ${agent.status}<br>
                    信心: ${(agent.confidence * 100).toFixed(0)}%<br>
                    <small>${new Date(agent.last_update).toLocaleTimeString('zh-Hant')}</small>
                </div>
            `;

            updateTime('agentsUpdateTime');
        }

        function updateTime(elementId) {
            const element = document.getElementById(elementId);
            if (element) {
                const now = new Date();
                element.textContent = `最後更新：${now.toLocaleTimeString('zh-Hant')}`;
            }
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = 'toast-notification';
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        async function startSystem() {
            try {
                const response = await fetch('/api/control/start', { method: 'POST' });
                if (response.ok) {
                    showNotification('系統已啟動');
                }
            } catch (e) {
                showNotification('啟動失敗: ' + e.message, 'error');
            }
        }

        async function pauseSystem() {
            try {
                const response = await fetch('/api/control/pause', { method: 'POST' });
                if (response.ok) {
                    showNotification('系統已暫停');
                }
            } catch (e) {
                showNotification('暫停失敗: ' + e.message, 'error');
            }
        }

        async function stopSystem() {
            if (confirm('確定要停止系統嗎？')) {
                try {
                    const response = await fetch('/api/control/stop', { method: 'POST' });
                    if (response.ok) {
                        showNotification('系統已停止');
                    }
                } catch (e) {
                    showNotification('停止失敗: ' + e.message, 'error');
                }
            }
        }

        async function resetSystem() {
            if (confirm('確定要重置系統嗎？')) {
                try {
                    const response = await fetch('/api/control/reset', { method: 'POST' });
                    if (response.ok) {
                        showNotification('系統已重置');
                        location.reload();
                    }
                } catch (e) {
                    showNotification('重置失敗: ' + e.message, 'error');
                }
            }
        }

        async function refreshData() {
            try {
                const [metricsResp, agentsResp, signalsResp] = await Promise.all([
                    fetch('/api/metrics/trading'),
                    fetch('/api/agents/summary'),
                    fetch('/api/signals/cosmic?limit=20')
                ]);

                if (metricsResp.ok) {
                    const metrics = await metricsResp.json();
                    updateMetrics(metrics);
                }

                if (agentsResp.ok) {
                    const agentsData = await agentsResp.json();
                    renderAgents(agentsData.agents);
                }

                if (signalsResp.ok) {
                    const signals = await signalsResp.json();
                    renderSignals(signals);
                }

                showNotification('數據已刷新');
            } catch (e) {
                showNotification('刷新失敗: ' + e.message, 'error');
            }
        }

        function renderAgents(agents) {
            const container = document.getElementById('agentContainer');
            container.innerHTML = '';
            
            for (const [name, agent] of Object.entries(agents)) {
                const agentElement = document.createElement('div');
                const statusClass = agent.status === 'running' ? 'running' : agent.status === 'error' ? 'error' : '';
                agentElement.className = `agent-card ${statusClass}`;
                agentElement.innerHTML = `
                    <div class="agent-name">${name}</div>
                    <div class="agent-status">
                        狀態: ${agent.status}<br>
                        信心: ${(agent.confidence * 100).toFixed(0)}%<br>
                        <small>${new Date(agent.last_update).toLocaleTimeString('zh-Hant')}</small>
                    </div>
                `;
                container.appendChild(agentElement);
            }

            updateTime('agentsUpdateTime');
        }

        function renderSignals(signals) {
            const signalList = document.getElementById('signalList');
            signalList.innerHTML = '';

            if (signals.length === 0) {
                signalList.innerHTML = '<div class="info-text">暫無信號</div>';
                return;
            }

            signals.reverse().forEach(signal => {
                const signalElement = document.createElement('div');
                signalElement.className = `signal-item ${signal.signal_type.toLowerCase()}`;
                signalElement.innerHTML = `
                    <strong>${signal.symbol}</strong> - ${signal.signal_type}
                    <br>Sharpe: ${signal.sharpe_ratio.toFixed(2)} | 信心: ${(signal.confidence * 100).toFixed(0)}%
                    <br><small>${new Date(signal.timestamp).toLocaleTimeString('zh-Hant')}</small>
                `;
                signalList.appendChild(signalElement);
            });

            updateTime('signalsUpdateTime');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            connectWebSocket();
            refreshData();

            // 每 5 秒刷新一次數據
            setInterval(refreshData, 5000);
        });

        // 頁面離開時關閉 WebSocket
        window.addEventListener('beforeunload', function() {
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>
