name: MarketBot Gateway

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even on non-scheduled days'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 0 * * *'  # Daily at 00:00 UTC (8:00 Beijing time)

env:
  PYTHON_VERSION: '3.11'

jobs:
  run-gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pip --upgrade
          pip install -e .

      - name: Create config directory
        run: mkdir -p ~/.marketbot

      - name: Create config.json from secrets
        run: |
          python3 << 'PYEOF'
          import json
          import os

          def bool_to_json(val):
              return 'true' if val else 'false'

          # Check which secrets are set
          has_telegram = os.getenv('TELEGRAM_BOT_TOKEN', '') != ''
          has_discord = os.getenv('DISCORD_BOT_TOKEN', '') != ''
          has_feishu = os.getenv('FEISHU_APP_ID', '') != ''
          has_slack = os.getenv('SLACK_BOT_TOKEN', '') != ''
          has_dingtalk = os.getenv('DINGTALK_CLIENT_ID', '') != ''
          has_email = os.getenv('EMAIL_USERNAME', '') != ''

          config = {
              "providers": {
                  "openrouter": {"apiKey": os.getenv('OPENROUTER_API_KEY', '')},
                  "anthropic": {"apiKey": os.getenv('ANTHROPIC_API_KEY', '')},
                  "openai": {"apiKey": os.getenv('OPENAI_API_KEY', '')},
                  "deepseek": {"apiKey": os.getenv('DEEPSEEK_API_KEY', '')},
                  "gemini": {"apiKey": os.getenv('GEMINI_API_KEY', '')},
                  "aihubmix": {"apiKey": os.getenv('AIHUBMIX_KEY', '')},
                  "siliconflow": {"apiKey": os.getenv('SILICONFLOW_API_KEY', '')}
              },
              "agents": {
                  "defaults": {
                      "model": "anthropic/claude-3-5-sonnet",
                      "provider": "openrouter"
                  }
              },
              "channels": {
                  "telegram": {
                      "enabled": has_telegram,
                      "token": os.getenv('TELEGRAM_BOT_TOKEN', ''),
                      "allowFrom": [os.getenv('TELEGRAM_CHAT_ID', '')] if has_telegram else []
                  },
                  "discord": {
                      "enabled": has_discord,
                      "token": os.getenv('DISCORD_BOT_TOKEN', ''),
                      "allowFrom": [os.getenv('DISCORD_CHANNEL_ID', '')] if has_discord else []
                  },
                  "feishu": {
                      "enabled": has_feishu,
                      "appId": os.getenv('FEISHU_APP_ID', ''),
                      "appSecret": os.getenv('FEISHU_APP_SECRET', '')
                  },
                  "slack": {
                      "enabled": has_slack,
                      "botToken": os.getenv('SLACK_BOT_TOKEN', ''),
                      "appToken": os.getenv('SLACK_APP_TOKEN', '')
                  },
                  "dingtalk": {
                      "enabled": has_dingtalk,
                      "clientId": os.getenv('DINGTALK_CLIENT_ID', ''),
                      "clientSecret": os.getenv('DINGTALK_CLIENT_SECRET', '')
                  },
                  "email": {
                      "enabled": has_email,
                      "imapHost": os.getenv('EMAIL_SMTP_HOST', ''),
                      "imapPort": int(os.getenv('EMAIL_SMTP_PORT', '993')),
                      "imapUsername": os.getenv('EMAIL_USERNAME', ''),
                      "imapPassword": os.getenv('EMAIL_PASSWORD', ''),
                      "smtpHost": os.getenv('EMAIL_SMTP_HOST', ''),
                      "smtpPort": int(os.getenv('EMAIL_SMTP_PORT', '587')),
                      "smtpUsername": os.getenv('EMAIL_USERNAME', ''),
                      "smtpPassword": os.getenv('EMAIL_PASSWORD', ''),
                      "fromAddress": os.getenv('EMAIL_FROM', ''),
                      "allowFrom": os.getenv('EMAIL_TO', '').split(',') if has_email else []
                  }
              }
          }

          with open(os.path.expanduser('~/.marketbot/config.json'), 'w') as f:
              json.dump(config, f, indent=2)
          print("Config created successfully")
          PYEOF

      - name: Run MarketBot Agent
        run: |
          marketbot agent -m "Hello! Say hello and tell me your capabilities."
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
