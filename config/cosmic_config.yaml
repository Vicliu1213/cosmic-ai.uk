# ============================================
# 宇宙智能體核心引擎 v3.0 - YAML 配置
# 適用於 Ray 深度整合版
# ============================================

# ----- 系統識別 -----
system:
  name: "CosmicIntelligenceCluster"
  version: "3.0.0"
  namespace: "cosmic"
  description: "分佈式宇宙智能體系統，具備量子驗證、理論演化與超指數交易"

# ----- 自定義資源預算 -----
custom_resources:
  consciousness_tokens:
    total: 100
    per_agent: 0.1
  compute_credits:
    total: 1000
    per_task: 0.01

# ----- 節點配置 -----
agents:
  default_resources:
    num_cpus: 2
    num_gpus: 0.5
    resources:
      consciousness_tokens: 0.1
      compute_credits: 0.5
  initial_count: 3
  naming_prefix: "Agent"

# ----- 共識機制 -----
consensus:
  enabled: true
  algorithm: "weighted_voting"
  voting_threshold: 0.67
  default_vote_weight: 1.0
  use_reputation: true
  consensus_manager:
    type: "leader"
    election_timeout_sec: 5
    heartbeat_interval_sec: 2

# ----- 理論基因組初始設定 -----
genome:
  theories:
    - name: "量子奇點"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "時間支配"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "宇宙智能"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "平台異構"
      initial_expression: 1.0
      quantum_entangled: false
    - name: "神經量子協同"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "量子生物融合"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "宇宙工程學"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "現實編程"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "完美堡壘"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "拓撲生物"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "混沌共振"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "分形遞歸"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "量子全息"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "生物光子"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "意識場"
      initial_expression: 1.0
      quantum_entangled: true
  mutation:
    base_rate: 0.05
    cycle_strength_factor: 0.05

# ----- 數據接口 -----
data_interface:
  type: "simulated"
  openbb:
    api_key: '${OPENBB_API_KEY}'
    base_url: "https://pro.openbb.co/api/v1"
    timeout_sec: 10
  market:
    symbols: ["BTC/USD", "ETH/USD", "SPY"]
    update_frequency_sec: 60
  threat_intel:
    enabled: true
    sources: ["darkweb", "social_media"]

# ----- 交易引擎參數 -----
trading:
  initial_capital: 1000000.0
  max_position_pct: 0.1
  stop_loss_pct: 0.05
  take_profit_pct: 0.15
  commission_pct: 0.001
  slippage_pct: 0.0005

# ----- 量子驗證任務配置 -----
quantum_tasks:
  grover:
    default_search_space: 1000000
  annealing:
    default_problem_size: 100
  shor:
    default_number: 15

# ----- 日誌與監控 -----
logging:
  level: "INFO"
  file: "logs/cosmic_engine.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

monitoring:
  prometheus:
    enabled: true
    port: 9090
  ray_dashboard:
    enabled: true
    port: 8265
