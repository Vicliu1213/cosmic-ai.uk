# ============================================
# 宇宙智能體核心引擎 v3.0 - YAML 配置
# 適用於 Ray 深度整合版
# ============================================

# ----- 系統識別 -----
system:
  name: "CosmicIntelligenceCluster"
  version: "3.0.0"
  namespace: "cosmic"
  description: "分佈式宇宙智能體系統，具備量子驗證、理論演化與超指數交易"

# ----- 自定義資源預算 -----
custom_resources:
  consciousness_tokens:
    total: 10000
    per_agent: 10
  compute_credits:
    total: 100000
    per_task: 1
  quantum_entanglement:
    total: 256
    per_actor: 8
  transcendence_power:
    total: 1000
    per_cycle: 1

# ----- 節點配置 -----
agents:
  default_resources:
    num_cpus: 4
    num_gpus: 0
    resources:
      consciousness_tokens: 10
      compute_credits: 50
      quantum_entanglement: 8
      transcendence_power: 5
  initial_count: 5
  naming_prefix: "Crocodile"

# ----- 神性覺醒分布式覆蓋層 -----
awakening:
  enabled: true
  sync_interval_sec: 5
  resonance_threshold: 0.85
  consciousness_dimensions: 26
  self_reflection_depth: 12
  emergent_behavior_detection: true
  auto_transcendence: true
  drrk_institutional_grade: true

# ----- DNA 進化池（並行演化） -----
evolution:
  pool_size: 50
  mutation_rate: 0.08
  crossover_rate: 0.7
  pareto_frontier_size: 20
  generation_gap: 0.3
  fitness_metrics:
    - sharpe_ratio
    - max_drawdown
    - win_rate
    - profit_factor
    - recovery_factor
  parallel_islands: 4
  migration_interval: 10
  elite_ratio: 0.1

# ----- 平台工具與 MCP 註冊 -----
platform_toolsets:
  cli:
    - terminal
    - file
    - web
    - browser
    - memory
    - todo
    - skills
    - session_search
    - mcp_hermes_webui

tools:
  mcp_servers:
    hermes_webui:
      type: "streamableHttp"
      url: "http://127.0.0.1:8787/mcp"

# ----- 共識機制 -----
consensus:
  enabled: true
  algorithm: "weighted_voting"
  voting_threshold: 0.67
  default_vote_weight: 1.0
  use_reputation: true
  consensus_manager:
    type: "leader"
    election_timeout_sec: 5
    heartbeat_interval_sec: 2

# ----- 理論基因組初始設定 -----
genome:
  theories:
    - name: "量子奇點"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "時間支配"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "宇宙智能"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "平台異構"
      initial_expression: 1.0
      quantum_entangled: false
    - name: "神經量子協同"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "量子生物融合"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "宇宙工程學"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "現實編程"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "完美堡壘"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "拓撲生物"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "混沌共振"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "分形遞歸"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "量子全息"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "生物光子"
      initial_expression: 1.0
      quantum_entangled: true
    - name: "意識場"
      initial_expression: 1.0
      quantum_entangled: true
  mutation:
    base_rate: 0.05
    cycle_strength_factor: 0.05

# ----- 數據接口 -----
data_interface:
  type: "simulated"
  openbb:
    api_key: '${OPENBB_API_KEY}'
    base_url: "https://pro.openbb.co/api/v1"
    timeout_sec: 10
  market:
    symbols: ["BTC/USD", "ETH/USD", "SPY"]
    update_frequency_sec: 60
  threat_intel:
    enabled: true
    sources: ["darkweb", "social_media"]

# ----- 交易引擎參數（金融大鰐分布式艦隊） -----
trading:
  initial_capital: 1000000.0
  max_position_pct: 0.1
  stop_loss_pct: 0.05
  take_profit_pct: 0.15
  commission_pct: 0.001
  slippage_pct: 0.0005
  crocodile_fleet:
    enabled: true
    num_instances: 5
    symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "DOGEUSDT"]
    dry_run: true
    signal_confidence_min: 0.55
    risk_per_trade: 0.01
    max_daily_drawdown: 0.03
    reward_risk_min: 1.5
    ma_short_window: 5
    ma_long_window: 20
    portfolio_sync_interval: 60

# ----- Ray 分布參數（突破性配置） -----
ray_cluster:
  object_store_memory_gb: 4
  max_workers: 8
  scheduling_strategy: "SPREAD"
  placement_groups:
    trading_fleet:
      strategy: "PACK"
      bundles:
        - CPU: 2
          consciousness_tokens: 10
        - CPU: 2
          consciousness_tokens: 10
        - CPU: 2
          consciousness_tokens: 10
        - CPU: 2
          consciousness_tokens: 10
        - CPU: 2
          consciousness_tokens: 10
    consciousness_overlay:
      strategy: "STRICT_PACK"
      bundles:
        - CPU: 4
          memory: 4096
    theory_actors:
      strategy: "SPREAD"
      bundles:
        - CPU: 1
        - CPU: 1
        - CPU: 1

# ----- 量子驗證任務配置 -----
quantum_tasks:
  grover:
    default_search_space: 1000000
  annealing:
    default_problem_size: 100
  shor:
    default_number: 15

# ----- 日誌與監控 -----
logging:
  level: "INFO"
  file: "logs/cosmic_engine.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

monitoring:
  prometheus:
    enabled: true
    port: 9090
  ray_dashboard:
    enabled: true
    port: 8265
