    target: layers
    threshold: 1.0
    realtime: true
    enabled: true
  - name: enhanced_classic
    target: enhanced_classic
    threshold: 1.0
    realtime: true
    enabled: true
  - name: module_catalog
    target: module_catalog
    threshold: 1.0
    realtime: true
    enabled: true
  - name: dashboard
    target: dashboard
    threshold: 1.0
    realtime: true
    enabled: true
  - name: sharpe_growth
    target: sharpe
    threshold: 1.05
    realtime: true
    enabled: true
  - name: growth_stack
    target: growth_stack
    threshold: 1.0
    realtime: true
    enabled: true
  - name: strategy_winrate
    target: strategy
    threshold: 1.0
    realtime: true
    enabled: true
