# ─── Hermes 技能配置 — 每項技能的作用域、激活條件、特殊條約 ───
# scope:  individual（作用自身）/ fleet（作用艦隊）/ system（作用系統）/ reality（作用現實）
# trigger: passive（常駐）/ active（主動）/ conditional（條件解鎖）/ global（全局生效）
# special: 技能專屬的額外約束

categories:
  戰鬥异能:
    base_activation_prob: 0.35
    base_mastery_gain: 0.012
    global_effect: false
    description: "需要目標或戰鬥情境才能激活"

  神经增强:
    base_activation_prob: 0.50
    base_mastery_gain: 0.015
    global_effect: true
    description: "被動強化神經系統，無需外部情境"

  时空操控:
    base_activation_prob: 0.25
    base_mastery_gain: 0.010
    global_effect: false
    description: "需要時空錨點或因果目標"

  永生肉体:
    base_activation_prob: 0.40
    base_mastery_gain: 0.008
    global_effect: true
    description: "被動維持，持續運作無需觸發"

  意识精神:
    base_activation_prob: 0.30
    base_mastery_gain: 0.020
    global_effect: true
    description: "意識層級擴展，全局共振"

