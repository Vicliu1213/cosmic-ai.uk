    base_activation_prob: 0.35
    base_mastery_gain: 0.018
    global_effect: false
    description: "需市場數據或交易事件才能激活"

  进化元能力:
    base_activation_prob: 0.15
    base_mastery_gain: 0.025
    global_effect: true
    description: "元層級被動，極難激活但增益最高"

