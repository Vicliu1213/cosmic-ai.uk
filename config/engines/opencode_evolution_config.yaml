# OpenCode 自進化配置引擎配置
# OpenCode Evolution Engine Configuration
# 配置自動學習、評估和優化系統

opencode_evolution:
  # 性能指標記錄配置 / Performance Metrics Configuration
  performance_metrics:
    enabled: true
    
    # 任務類型 / Task Types
    task_types:
      - "code_generation"
      - "analysis"
      - "refactor"
      - "debug"
      - "documentation"
      
    # 代理類型 / Agent Types
    agent_types:
      - "build"
      - "plan"
      - "general"
      - "explore"
      
    # 模型類型 / Model Types
    model_types:
      - "claude-haiku-4"
      - "claude-opus"
      - "gpt-4"
      
    # 指標收集 / Metrics Collection
    collection:
      enabled: true
      record_duration: true
      record_success_rate: true
      record_quality_score: [0, 100]
      record_token_usage: true
      record_feedback: true
      
  # 配置變體管理 / Configuration Variants Management
  configuration_variants:
    enabled: true
    
    # 變體存儲 / Variant Storage
    storage:
      enabled: true
      max_variants: [10, 1000]
      storage_format: "json"
      backup_enabled: true
      
    # 變體評分 / Variant Scoring
    scoring:
      enabled: true
      
      # 平均分數 / Average Score
      average_score_range: [0.0, 100.0]
      
      # 試驗計數 / Trial Count
      trial_count_range: [0, 10000]
      
      # 成功率 / Success Rate
      success_rate_range: [0.0, 1.0]
      
    # 變體優化 / Variant Optimization
    optimization:
      enabled: true
      
      # 任務適應度 / Task Fitness
      adapt_to_task_types: true
      
      # 自動演進 / Auto Evolution
      auto_evolution: true
      evolution_rate: [0.01, 0.5]
      
  # 代理性能分析 / Agent Performance Analysis
  agent_analysis:
    enabled: true
    
    # 性能指標 / Performance Metrics
    metrics:
      quality_score_tracking: true
      duration_tracking: true
      success_rate_tracking: true
      token_efficiency_tracking: true
      
    # 代理比較 / Agent Comparison
    comparison:
      enabled: true
      compare_across_tasks: true
      benchmark_against_baseline: true
      
    # 推薦系統 / Recommendation System
    recommendations:
      enabled: true
      recommend_best_agent_per_task: true
      suggest_configuration_improvements: true
      
  # 模型性能評估 / Model Performance Evaluation
  model_evaluation:
    enabled: true
    
    # 模型指標 / Model Metrics
    metrics:
      quality_per_model: true
      cost_per_model: true
      speed_per_model: true
      reliability_per_model: true
      
    # 模型對比 / Model Comparison
    comparison:
      enabled: true
      compare_models: true
      suggest_best_model_per_task: true
      
  # 配置優化引擎 / Configuration Optimization Engine
  configuration_optimization:
    enabled: true
    
    # 優化方法 / Optimization Method
    method: "evolutionary"  # evolutionary, bayesian, grid_search
    
    # 進化參數 / Evolution Parameters
    evolution:
      population_size: [10, 100]
      generations: [10, 500]
      mutation_rate: [0.01, 0.5]
      crossover_rate: [0.5, 0.99]
      elite_size: [1, 20]
      
    # 貝葉斯優化參數 / Bayesian Optimization Parameters
    bayesian:
      acquisition_function: "ei"  # ei, ucb, poi
      num_iterations: [10, 1000]
      initial_samples: [5, 50]
      
  # 學習與適應 / Learning and Adaptation
  learning:
    enabled: true
    
    # 在線學習 / Online Learning
    online_learning:
      enabled: true
      learning_rate: [0.001, 0.1]
      forgetting_factor: [0.95, 0.99]
      
    # 遷移學習 / Transfer Learning
    transfer_learning:
      enabled: true
      reuse_similar_tasks: true
      knowledge_base: "experience_database"
      
    # 持續改進 / Continuous Improvement
    continuous_improvement:
      enabled: true
      improvement_threshold: [0.01, 0.1]
      max_iterations: [100, 10000]
      
  # 報告與可視化 / Reporting and Visualization
  reporting:
    enabled: true
    
    # 報告生成 / Report Generation
    generation:
      enabled: true
      format: "json"  # json, html, pdf
      frequency: "daily"  # hourly, daily, weekly
      
    # 性能儀表板 / Performance Dashboard
    dashboard:
      enabled: true
      update_frequency_seconds: [10, 3600]
      metrics_to_display:
        - "agent_performance"
        - "model_comparison"
        - "configuration_effectiveness"
        - "improvement_trends"
        
    # 數據導出 / Data Export
    export:
      enabled: true
      export_formats: ["json", "csv", "parquet"]
      compression: true
      
  # 高級選項 / Advanced Options
  advanced:
    enabled: true
    
    # 實驗模式 / Experimental Mode
    experimental_mode: false
    
    # 調試選項 / Debug Options
    debug:
      enabled: false
      verbose_logging: true
      save_all_metrics: true
      
    # 併行處理 / Parallel Processing
    parallel_processing:
      enabled: true
      max_workers: [1, 32]
      
    # 快取配置 / Caching Configuration
    caching:
      enabled: true
      cache_metrics: true
      cache_ttl_days: [1, 30]

# 配置檔案 / Configuration Profiles
profiles:
  conservative:
    description: "保守模式 - 小規模學習"
    configuration_variants.storage.max_variants: 50
    agent_analysis.comparison.enabled: false
    configuration_optimization.method: "grid_search"
    configuration_optimization.evolution.population_size: 10
    learning.learning_rate: 0.001
    
  balanced:
    description: "平衡模式 - 標準進化配置"
    configuration_variants.storage.max_variants: 200
    agent_analysis.comparison.enabled: true
    configuration_optimization.method: "evolutionary"
    configuration_optimization.evolution.population_size: 50
    configuration_optimization.evolution.generations: 100
    learning.learning_rate: 0.01
    
  aggressive:
    description: "激進模式 - 全面優化"
    configuration_variants.storage.max_variants: 1000
    agent_analysis.comparison.enabled: true
    configuration_optimization.method: "bayesian"
    configuration_optimization.evolution.population_size: 100
    configuration_optimization.evolution.generations: 500
    learning.learning_rate: 0.1
    learning.online_learning.enabled: true
    learning.continuous_improvement.max_iterations: 10000
