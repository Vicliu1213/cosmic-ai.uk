    # 出場條件
    出場條件:
      流動性不足撤出: true
      波動率增大自動停止: 0.08   # 8%
      時間週期重新平衡: true
      
  # 風險管理
  風險管理:
    單筆頭寸大小: 0.15   # 15% 投資組合
    最大同時頭寸: 5
    槓桿倍數: 1.0        # 無槓桿
    無常損失管理: true
    對沖策略: true
    
  # 目標績效
  目標績效:
    年化收益率: 0.20     # 20%
    夏普比率: 2.2
    最大回撤: -0.05      # -5%
    費用收入率: 0.08     # 8% 年化
    LP收益率: 0.12       # 12% 年化

