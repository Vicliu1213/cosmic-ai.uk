      - "curve"
      - "balancer"
      - "aave_pool"
      - "compound"
    支持的鏈: ["ethereum", "arbitrum", "optimism", "polygon"]
    支持的幣對: ["ETH/USDC", "USDC/USDT", "DAI/USDC", "WBTC/ETH"]
    
