    轉賬成本估算: true
    網路延遲估計: 500    # 毫秒
    
    # 入場條件
    入場條件:
      利潤率最小值: 0.008  # 0.8%
      流動性最小值: 100000  # USDT
      交易對活躍度: "HIGH"
      執行速度: "FAST"
      
    # 出場條件
    出場條件:
      利潤鎖定: true
      自動執行時間: 60     # 秒
      市場變動止損: 0.002  # 0.2%
      
  # 風險管理
  風險管理:
    單筆頭寸大小: 0.10   # 10% 投資組合
    最大同時頭寸: 10
    槓桿倍數: 1.0        # 無槓桿
    資本配置: "DYNAMIC"
    流動性管理: true
    
  # 目標績效
  目標績效:
    年化收益率: 0.15     # 15% (低但穩定)
    夏普比率: 3.5        # 非常穩定
    最大回撤: -0.01      # -1%
    勝率: 0.95            # 95% (無風險)
    盈虧比: 100.0        # 極高

  # 交易所配置
  交易所:
    主要交易所:
      - "binance"
      - "kraken"
      - "coinbase"
      - "bitstamp"
      - "gemini"
    支持的幣對: ["BTC/USDT", "ETH/USDT", "BNB/USDT", "SOL/USDT", "XRP/USDT"]
    
  # 監控告警
  監控:
    實時監控: true
    機會告警: true
    執行告警: true
