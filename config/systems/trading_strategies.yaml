# 監控與告警配置
# Monitoring and Alert Configuration
監控告警:
  全局監控:
    監控頻率: 60         # 秒
    指標計算頻率: 300    # 秒 (5分鐘)
    日誌級別: "INFO"
    
  性能指標:
    - 當前淨值 (Current NAV)
    - 日回報率 (Daily Return)
    - 夏普比率 (Sharpe Ratio)
    - 最大回撤 (Max Drawdown)
    - 勝率 (Win Rate)
    - 交易總數 (Total Trades)
    
  告警規則:
    - 單日虧損 > -2%: 級別 WARNING
    - 單日虧損 > -5%: 級別 CRITICAL (自動暫停)
    - 夏普比率 < 1.5: 級別 WARNING
    - 回撤 > -10%: 級別 WARNING
    - API連接失敗: 級別 CRITICAL
    - 資金不足: 級別 CRITICAL
    
  通知方式:
    - 郵件告警: true
    - 短信告警: true
    - Telegram 機器人: true
    - 儀表板提醒: true

