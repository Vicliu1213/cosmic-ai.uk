# 策略2: 情緒反轉策略
# Sentiment Reversal Strategy
策略_2_情緒反轉:
  名稱: "情緒反轉策略"
  英文名: "Sentiment Reversal Strategy"
  描述: "通過社交媒體情緒分析和技術指標識別反轉機會"
  優先級: 2
  啟用: true
  
  # 策略參數
  參數:
    # 情緒分析參數
    情緒檢查頻率: 3600    # 秒 (1小時)
    情緒窗口大小: 24      # 小時
    極端情緒閾值: 0.75    # 75%
    情緒反轉信號: -0.40   # 相反情緒變化
    
    # 技術指標參數
    RSI周期: 14
    RSI超買值: 70
    RSI超賣值: 30
    MACD快線周期: 12
    MACD慢線周期: 26
    MACD信號線: 9
    
    # 入場條件
    入場條件:
      情緒極端等級: "EXTREME"
      反轉信號強度: 0.08   # 8%
      技術面確認: true
      成交量確認: true
      
    # 出場條件  
    出場條件:
      止損點數: -0.04      # -4%
      止盈點數: 0.12       # 12%
      時間止損小時: 48
      情緒恢復退出: true
      
  # 風險管理
  風險管理:
    單筆頭寸大小: 0.04   # 4% 投資組合
    最大同時頭寸: 4
    槓桿倍數: 2.0
    動態止損: true
    情緒確認止損: true
    
  # 目標績效
  目標績效:
    年化收益率: 0.35     # 35%
    夏普比率: 2.8
    最大回撤: -0.06      # -6%
    勝率: 0.62            # 62%
    盈虧比: 2.2

  # 數據源
  數據源:
    情緒提供商: ["twitter", "telegram", "reddit", "news_feeds"]
    技術數據源: ["binance", "kraken", "coinbase"]
    更新頻率: 300        # 秒 (5分鐘)
    
  # 監控告警
  監控:
    實時監控: true
    情緒告警: true
    告警級別: "WARNING"
    日誌詳細度: "HIGH"

