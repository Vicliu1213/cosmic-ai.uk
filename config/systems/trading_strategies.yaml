# 策略1: 量子動量策略
# Quantum Momentum Strategy
策略_1_量子動量:
  名稱: "量子動量策略"
  英文名: "Quantum Momentum Strategy"
  描述: "利用量子算法檢測市場動量並執行趨勢追蹤"
  優先級: 1
  啟用: true
  
  # 策略參數
  參數:
    # 動量檢測參數
    動量周期: 20          # 天
    加速度閾值: 0.015    # 1.5%
    動量確認周期: 5      # 天
    最小動量強度: 0.02   # 2%
    
    # 量子參數
    量子維度: 512
    干涉強度: 0.8
    退相干因子: 0.05
    量子加速模式: true
    
    # 入場條件
    入場條件:
      動量強度最小值: 0.025  # 2.5%
      確認K線數: 3
      RSI最小值: 50
      RSI最大值: 85
      MACD信號確認: true
      
    # 出場條件
    出場條件:
      止損點數: -0.03    # -3%
      止盈點數: 0.08     # 8%
      動量反轉退出: true
      時間止損天數: 30
      
  # 風險管理
  風險管理:
    單筆頭寸大小: 0.05   # 5% 投資組合
    最大同時頭寸: 5
    槓桿倍數: 1.5
    動態止損: true
    止損跟蹤: 0.02       # 跟蹤止損距離 2%
    
  # 目標績效
  目標績效:
    年化收益率: 0.25     # 25%
    夏普比率: 2.5
    最大回撤: -0.08      # -8%
    勝率: 0.58            # 58%
    盈虧比: 1.8

  # 交易時段
  交易時段:
    活躍時間: ["04:00", "20:00"]  # UTC
    時區: "UTC"
    避開新聞事件: true
    
  # 監控告警
  監控:
    實時監控: true
    告警級別: "INFO"
    日誌詳細度: "MEDIUM"

