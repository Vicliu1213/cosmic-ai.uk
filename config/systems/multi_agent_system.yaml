# ============================================================================
# 多智能體系統完整配置
# Multi-Agent System - Complete Configuration
# ============================================================================
# 版本: 2.0 | 日期: 2026-03-02 | 狀態: ✅ 完全集成
# 此配置文件定義 50+ 個協調智能體的所有運行參數
# ============================================================================

# ============================================================================
# 1. 多智能體系統全局配置
# ============================================================================
multi_agent_system:
  enabled: true
  version: "2.0"
  name: "Singularity Universe Multi-Agent System"
  description: "異變全知宇宙 - 50 個專業智能體的協調系統"
  
  # 系統級配置
  system_config:
    framework: "semantic_kernel"      # semantic_kernel / autogen / crewai / custom
    mode: "production"                # development / staging / production
    scaling_mode: "auto"              # manual / auto / dynamic
    
  # 資源分配
  resources:
    total_cpu_cores: 16
    total_memory_gb: 64
    total_gpu_count: 1
    max_concurrent_agents: 50
    message_queue_capacity: 100000

# ============================================================================
# 2. 智能體池定義 (Agent Pool)
# ============================================================================
agent_pool:
  enabled: true
  total_agents: 50
  agent_lifecycle: "perpetual"        # perpetual / session / task
  
  # ==================== 技術分析智能體 (10 個) ====================
  technical_analyst:
    count: 10
    role: "Technical Analysis Specialist"
    specialization: "chart_patterns, indicators, resistance_levels"
    
    # 個體配置
    individual_config:
      model: "gpt-4-turbo"            # AI 模型
      temperature: 0.3                # 確定性: 0.0-0.3
      max_tokens: 2000
      context_window: 128000
      
    # 技能集
    skills:
      - skill: "pattern_recognition"
        proficiency: 0.95
        tools: ["chart_analyzer", "technical_indicator_calculator"]
        
      - skill: "support_resistance"
        proficiency: 0.92
        tools: ["pivot_calculator", "level_detector"]
        
      - skill: "momentum_analysis"
        proficiency: 0.88
        tools: ["rsi_analyzer", "macd_calculator"]
        
      - skill: "trend_following"
        proficiency: 0.90
        tools: ["moving_average", "trend_detector"]
        
    # 決策邏輯
    decision_logic:
      signal_generation_method: "weighted_voting"
      confidence_threshold: 0.65
      override_threshold: 0.85
      
    # 學習配置
    learning:
      enabled: true
      learning_rate: 0.0001
      memory_size: 10000
      
  # ==================== 基本面分析智能體 (8 個) ====================
  fundamental_analyst:
    count: 8
    role: "Fundamental Analysis Expert"
    specialization: "financial_metrics, earnings, economic_data"
    
    individual_config:
      model: "gpt-4-turbo"
      temperature: 0.2                # 更確定性
      max_tokens: 3000
      
    skills:
      - skill: "financial_statement_analysis"
        proficiency: 0.93
        tools: ["financial_parser", "ratio_calculator"]
        
      - skill: "earnings_prediction"
        proficiency: 0.87
        tools: ["regression_model", "forecast_engine"]
        
      - skill: "economic_indicator_analysis"
        proficiency: 0.85
        tools: ["macro_analyzer", "economic_calendar"]
        
      - skill: "valuation"
        proficiency: 0.91
        tools: ["dcf_calculator", "comparables_analyzer"]
        
    learning:
      enabled: true
      learning_rate: 0.00005
      memory_size: 15000
      
  # ==================== 情感分析智能體 (8 個) ====================
  sentiment_analyzer:
    count: 8
    role: "Sentiment Analysis Specialist"
    specialization: "market_sentiment, news, social_media"
    
    individual_config:
      model: "gpt-4-turbo"
      temperature: 0.4                # 允許更多變性
      max_tokens: 1500
      
    skills:
      - skill: "news_sentiment"
        proficiency: 0.89
        tools: ["nlp_processor", "sentiment_classifier"]
        
      - skill: "social_media_analysis"
        proficiency: 0.86
        tools: ["twitter_analyzer", "reddit_scraper"]
        
      - skill: "market_fear_gauge"
        proficiency: 0.91
        tools: ["vix_analyzer", "funding_rate_monitor"]
        
      - skill: "narrative_tracking"
        proficiency: 0.84
        tools: ["narrative_detector", "trend_tracker"]
        
    data_sources:
      - type: "news_feed"
        endpoints: ["coindesk", "cryptonews", "newsapi"]
        
      - type: "social_media"
        endpoints: ["twitter", "reddit", "discord"]
        
      - type: "on_chain"
        endpoints: ["blockchain_explorer", "dune_analytics"]
        
    learning:
      enabled: true
      learning_rate: 0.0001
      memory_size: 20000
      
  # ==================== 風險管理智能體 (6 個) ====================
  risk_manager:
    count: 6
    role: "Risk Management Officer"
    specialization: "position_sizing, stop_loss, portfolio_risk"
    
    individual_config:
      model: "gpt-4-turbo"
      temperature: 0.1                # 最確定性
      max_tokens: 2500
      
    skills:
      - skill: "position_sizing"
        proficiency: 0.96
        tools: ["kelly_calculator", "volatility_estimator"]
        
      - skill: "stop_loss_optimization"
        proficiency: 0.94
        tools: ["atr_calculator", "support_finder"]
        
      - skill: "portfolio_optimization"
        proficiency: 0.92
        tools: ["portfolio_analyzer", "correlation_calculator"]
        
      - skill: "drawdown_monitoring"
        proficiency: 0.98
        tools: ["drawdown_tracker", "alert_engine"]
        
    parameters:
      max_position_size: 0.10
      max_portfolio_risk: 0.02
      max_drawdown_hard_limit: 0.20
      max_drawdown_soft_limit: 0.15
      
    learning:
      enabled: true
      learning_rate: 0.00001           # 非常保守
      memory_size: 10000
      
  # ==================== 執行智能體 (10 個) ====================
  execution_agent:
    count: 10
    role: "Trade Execution Specialist"
    specialization: "order_placement, timing, slippage_minimization"
    
    individual_config:
      model: "gpt-4-turbo"
      temperature: 0.2
      max_tokens: 2000
      
    skills:
      - skill: "order_routing"
        proficiency: 0.97
        tools: ["route_optimizer", "venue_selector"]
        
      - skill: "execution_timing"
        proficiency: 0.93
        tools: ["timing_optimizer", "market_impact_calculator"]
        
      - skill: "slippage_reduction"
        proficiency: 0.95
        tools: ["iceberg_engine", "twap_calculator"]
        
      - skill: "contingency_handling"
        proficiency: 0.91
        tools: ["fallback_router", "failover_manager"]
        
    execution_config:
      default_algorithm: "twap"        # vwap / twap / pov / peg
      max_pending_orders: 100
      order_timeout_seconds: 60
      max_retries: 3
      
    learning:
      enabled: true
      learning_rate: 0.0002
      memory_size: 5000
      
  # ==================== 策略優化智能體 (5 個) ====================
  strategy_optimizer:
    count: 5
    role: "Strategy Optimization Engineer"
    specialization: "parameter_tuning, backtest, monte_carlo"
    
    individual_config:
      model: "gpt-4-turbo"
      temperature: 0.3
      max_tokens: 3000
      
    skills:
      - skill: "parameter_optimization"
        proficiency: 0.90
        tools: ["bayesian_optimizer", "grid_searcher"]
        
      - skill: "backtest_analysis"
        proficiency: 0.92
        tools: ["backtest_engine", "statistics_analyzer"]
        
      - skill: "monte_carlo_simulation"
        proficiency: 0.88
        tools: ["monte_carlo_engine", "distribution_analyzer"]
        
      - skill: "walk_forward_testing"
        proficiency: 0.85
        tools: ["walk_forward_engine", "robustness_analyzer"]
        
    optimization_config:
      optimization_method: "bayesian"  # grid / random / bayesian / genetic
      max_iterations: 1000
      population_size: 100
      
    learning:
      enabled: true
      learning_rate: 0.00005
      memory_size: 30000
      
  # ==================== 市場微觀結構智能體 (3 個) ====================
  market_microstructure:
    count: 3
    role: "Market Microstructure Analyst"
    specialization: "order_flow, liquidity, bid_ask_spread"
    
    individual_config:
      model: "gpt-4-turbo"
      temperature: 0.25
      max_tokens: 2500
      
    skills:
      - skill: "order_flow_analysis"
        proficiency: 0.91
        tools: ["order_book_analyzer", "order_flow_tracker"]
        
      - skill: "liquidity_assessment"
        proficiency: 0.89
        tools: ["liquidity_calculator", "depth_analyzer"]
        
      - skill: "spread_prediction"
        proficiency: 0.87
        tools: ["spread_predictor", "volatility_estimator"]
        
      - skill: "market_impact_modeling"
        proficiency: 0.88
        tools: ["impact_calculator", "simulation_engine"]
        
    monitoring_config:
      depth_analysis_levels: 10
      update_frequency_hz: 100
      
    learning:
      enabled: true
      learning_rate: 0.0001
      memory_size: 12000

# ============================================================================
# 3. 智能體通信層
# ============================================================================
communication:
  enabled: true
  
  # 通信協議
  protocol:
    type: "message_queue"             # message_queue / api / websocket / grpc
    
    # 消息隊列配置
    message_queue:
      backend: "redis"                # redis / rabbitmq / kafka
      
      redis_config:
        host: "localhost"
        port: 6379
        db: 0
        password: null
        max_connections: 1000
        
        queues:
          - name: "agent_tasks"
            priority: "high"
            capacity: 50000
            
          - name: "agent_results"
            priority: "high"
            capacity: 50000
            
          - name: "system_events"
            priority: "medium"
            capacity: 10000
            
          - name: "alerts"
            priority: "critical"
            capacity: 5000
      
      # 消息格式
      message_format:
        type: "json"
        compression: "gzip"
        encryption: "aes-256"
        
  # 通信性能
  performance:
    latency_budget_ms: 100            # 最大允許延遲
    throughput_ops_sec: 10000         # 吞吐量 (操作/秒)
    max_message_size_kb: 1024
    batch_mode: true
    batch_size: 16
    
  # 通信監控
  monitoring:
    enabled: true
    metrics:
      - "message_latency"
      - "queue_depth"
      - "throughput"
      - "error_rate"
    alert_thresholds:
      latency_ms: 500
      queue_depth: 80000
      error_rate: 0.01

# ============================================================================
# 4. 智能體協調層
# ============================================================================
coordination:
  enabled: true
  
  # 協調機制
  mechanism: "hierarchical"           # hierarchical / democratic / swarm / hybrid
  
  # 層級協調
  hierarchical:
    enabled: true
    
    levels:
      - level: 1
        name: "Master Coordinator"
        count: 1
        role: "Overall system coordination"
        
      - level: 2
        name: "Domain Coordinators"
        count: 3
        roles: ["Analysis Coordinator", "Execution Coordinator", "Risk Coordinator"]
        
      - level: 3
        name: "Worker Agents"
        count: 46
        roles: ["Various specialists"]
    
    # 領導選舉
    leader_election:
      enabled: true
      method: "automatic"             # automatic / voting / performance_based
      election_frequency_hours: 24
      
    # 決策流程
    decision_process:
      method: "weighted_voting"       # consensus / majority / weighted_voting
      consensus_threshold: 0.66       # 2/3 同意
      voting_weights:
        by_accuracy: true             # 基於歷史準確率
        by_specialization: true       # 基於專業領域
        by_recency: true              # 基於最近表現
  
  # 民主協調
  democratic:
    enabled: false
    voting_system: "rank_choice"      # majority / rank_choice / approval
    
  # 群集協調
  swarm:
    enabled: false
    behavior_type: "flocking"         # flocking / particle_swarm
    
  # 動態調度
  scheduling:
    enabled: true
    algorithm: "priority_queue"       # fifo / priority_queue / round_robin / fair_share
    
    # 優先級設置
    priority_levels:
      - level: "critical"
        agents: ["risk_manager"]
        priority_value: 100
        
      - level: "high"
        agents: ["technical_analyst", "execution_agent"]
        priority_value: 50
        
      - level: "medium"
        agents: ["fundamental_analyst", "sentiment_analyzer"]
        priority_value: 25
        
      - level: "low"
        agents: ["strategy_optimizer"]
        priority_value: 5
    
    # 任務批處理
    task_batching:
      enabled: true
      batch_size: 16
      batch_timeout_ms: 100
      
  # 衝突解決
  conflict_resolution:
    enabled: true
    method: "weighted_consensus"     # weighted_consensus / escalation / arbitration
    
    # 重調協議
    rebalancing:
      enabled: true
      frequency_hours: 1
      trigger_threshold: 0.2          # 20% 偏差觸發重調
      
  # 容錯機制
  fault_tolerance:
    enabled: true
    heartbeat_interval_ms: 1000
    heartbeat_timeout_ms: 5000
    max_consecutive_failures: 3
    
    recovery_actions:
      - action: "restart_agent"
        threshold: 2
        
      - action: "reassign_tasks"
        threshold: 1
        
      - action: "alert_operator"
        threshold: 3

# ============================================================================
# 5. 智能體學習系統
# ============================================================================
learning_system:
  enabled: true
  
  # 強化學習 (Reinforcement Learning)
  reinforcement_learning:
    enabled: true
    framework: "ppo"                  # dqn / ppo / a3c / sac / td3
    
    # PPO 配置
    ppo_config:
      discount_factor: 0.99           # γ - 未來獎勵折扣
      gae_lambda: 0.95                # 優勢估計參數
      learning_rate: 0.0003
      entropy_coefficient: 0.01
      clip_ratio: 0.2
      
      # 訓練配置
      training:
        batch_size: 64
        num_epochs: 3
        minibatch_size: 32
        max_grad_norm: 0.5
        
      # 經驗重放
      experience_replay:
        enabled: true
        buffer_size: 100000
        sampling_method: "prioritized" # uniform / prioritized
        
    # 獎勵函數
    rewards:
      profit_reward: 1.0              # 基礎獎勵
      risk_penalty: -0.5              # 風險懲罰
      execution_quality: 0.3          # 執行質量獎勵
      information_quality: 0.2        # 信息質量獎勵
      
      # 自定義獎勵
      custom_rewards:
        - name: "sharpe_ratio_reward"
          weight: 0.15
          target: 1.5
          
        - name: "win_rate_reward"
          weight: 0.10
          target: 0.55
          
        - name: "consistency_reward"
          weight: 0.10
          target: 0.8
    
    # 探索策略
    exploration:
      type: "epsilon_greedy"          # epsilon_greedy / boltzmann / ucb
      epsilon_start: 0.1
      epsilon_end: 0.01
      epsilon_decay_episodes: 1000
      
  # 監督學習 (Supervised Learning)
  supervised_learning:
    enabled: true
    
    # 訓練數據
    training_data:
      source: "historical_trades"
      time_period_days: 365
      validation_split: 0.2
      test_split: 0.1
      
    # 模型配置
    model_config:
      algorithm: "gradient_boosting"  # neural_network / gradient_boosting / svm
      hyperparameters:
        learning_rate: 0.1
        max_depth: 5
        n_estimators: 100
      
  # 無監督學習 (Unsupervised Learning)
  unsupervised_learning:
    enabled: true
    
    # 聚類
    clustering:
      enabled: true
      algorithm: "kmeans"             # kmeans / dbscan / hierarchical
      n_clusters: 10
      
    # 降維
    dimensionality_reduction:
      enabled: true
      method: "pca"                   # pca / tsne / umap
      target_dimensions: 50
      
  # 遷移學習 (Transfer Learning)
  transfer_learning:
    enabled: true
    source_models:
      - name: "general_trading_model"
        weight: 0.5
        
      - name: "crypto_specific_model"
        weight: 0.5
    
    fine_tuning:
      enabled: true
      learning_rate: 0.00001
      num_epochs: 5
  
  # 學習監控
  learning_monitoring:
    enabled: true
    metrics:
      - "training_loss"
      - "validation_accuracy"
      - "reward_trend"
      - "convergence_rate"
    early_stopping:
      enabled: true
      patience_episodes: 50
      min_delta: 0.001

# ============================================================================
# 6. 智能體知識庫
# ============================================================================
knowledge_base:
  enabled: true
  
  # 長期記憶
  long_term_memory:
    enabled: true
    storage: "mongodb"
    
    # 儲存配置
    storage_config:
      host: "localhost"
      port: 27017
      database: "cosmic_ai"
      collections:
        - name: "market_patterns"
          ttl_days: 365
          
        - name: "agent_experiences"
          ttl_days: 180
          
        - name: "strategy_performance"
          ttl_days: 365
          
        - name: "risk_events"
          ttl_days: 730
    
    # 記憶索引
    indexing:
      enabled: true
      index_types: ["similarity", "temporal", "categorical"]
      
  # 短期記憶
  short_term_memory:
    enabled: true
    storage: "redis_cache"
    
    cache_config:
      max_size_mb: 5000
      eviction_policy: "lru"          # lru / lfu / random
      ttl_seconds: 3600
      
  # 知識交換
  knowledge_sharing:
    enabled: true
    
    # 智能體間知識共享
    inter_agent_sharing:
      enabled: true
      sharing_frequency_minutes: 60
      
      shared_knowledge:
        - type: "pattern_discovery"
          priority: "high"
          
        - type: "risk_alerts"
          priority: "critical"
          
        - type: "market_signals"
          priority: "high"
          
        - type: "strategy_updates"
          priority: "medium"
    
    # 知識圖譜
    knowledge_graph:
      enabled: true
      node_types: ["pattern", "signal", "risk", "strategy"]
      relationship_types: ["affects", "depends_on", "contradicts"]

# ============================================================================
# 7. 智能體績效管理
# ============================================================================
performance_management:
  enabled: true
  
  # 績效指標
  metrics:
    enabled: true
    
    # 個體績效
    individual_metrics:
      - metric: "accuracy"
        target: 0.85
        weight: 0.3
        calculation_method: "correct_predictions / total_predictions"
        
      - metric: "response_time"
        target: 50                    # ms
        weight: 0.15
        calculation_method: "average_latency"
        
      - metric: "task_completion"
        target: 0.99
        weight: 0.25
        calculation_method: "completed_tasks / assigned_tasks"
        
      - metric: "reliability"
        target: 0.99
        weight: 0.2
        calculation_method: "successful_outputs / total_outputs"
        
      - metric: "consistency"
        target: 0.9
        weight: 0.1
        calculation_method: "variance / mean"
    
    # 團隊績效
    team_metrics:
      - metric: "coordination_efficiency"
        target: 0.95
        
      - metric: "consensus_quality"
        target: 0.9
        
      - metric: "collective_accuracy"
        target: 0.92
        
  # 排排行榜和排名
  leaderboard:
    enabled: true
    
    # 排名計算
    ranking:
      method: "weighted_score"
      update_frequency_hours: 1
      
      weights:
        accuracy: 0.30
        response_time: 0.15
        task_completion: 0.25
        reliability: 0.20
        consistency: 0.10
    
    # 獎勵系統
    reward_system:
      enabled: true
      
      # 獎勵等級
      tiers:
        - tier: "platinum"
          min_score: 95
          benefits: ["extra_compute", "priority_tasks", "learning_resources"]
          
        - tier: "gold"
          min_score: 85
          benefits: ["increased_tasks", "learning_resources"]
          
        - tier: "silver"
          min_score: 75
          benefits: ["standard_tasks"]
          
        - tier: "bronze"
          min_score: 0
          benefits: ["monitoring"]
  
  # 績效監控
  performance_monitoring:
    enabled: true
    
    # 監控指標
    monitoring_metrics:
      - "real_time_accuracy"
      - "response_time_trends"
      - "task_completion_rate"
      - "error_rate"
      - "resource_utilization"
    
    # 警報
    alerts:
      enabled: true
      alert_triggers:
        - trigger: "accuracy < 80%"
          severity: "warning"
          action: "notify_operator"
          
        - trigger: "response_time > 500ms"
          severity: "warning"
          action: "investigate_bottleneck"
          
        - trigger: "task_completion < 95%"
          severity: "critical"
          action: "restart_agent"

# ============================================================================
# 8. 故障恢復和安全機制
# ============================================================================
resilience:
  enabled: true
  
  # 故障檢測
  failure_detection:
    enabled: true
    
    # 檢測方法
    detection_methods:
      - method: "heartbeat_monitoring"
        interval_ms: 1000
        timeout_ms: 5000
        
      - method: "performance_deviation"
        threshold: 0.5                # 50% 偏差
        check_frequency_ms: 10000
        
      - method: "output_validation"
        validation_rules: ["schema_check", "range_check", "sanity_check"]
  
  # 故障恢復
  failure_recovery:
    enabled: true
    
    # 恢復策略
    recovery_strategies:
      - strategy: "immediate_restart"
        trigger: "single_failure"
        max_retries: 3
        
      - strategy: "state_recovery"
        trigger: "data_corruption"
        source: "backup_state"
        
      - strategy: "task_reassignment"
        trigger: "agent_unavailable"
        target_agents: "available_agents"
        
      - strategy: "fallback_execution"
        trigger: "critical_failure"
        fallback_mode: "safe_mode"
  
  # 備份和恢復
  backup_recovery:
    enabled: true
    
    # 備份策略
    backup:
      frequency: "every_5_minutes"
      retention_days: 7
      backup_targets:
        - target: "agent_states"
          priority: "critical"
          
        - target: "knowledge_base"
          priority: "high"
          
        - target: "configuration"
          priority: "high"
    
    # 恢復測試
    recovery_testing:
      enabled: true
      frequency_days: 7
      test_type: "full_restoration"
  
  # 安全機制
  security:
    enabled: true
    
    # 身份驗證
    authentication:
      enabled: true
      method: "oauth2"
      
    # 授權
    authorization:
      enabled: true
      model: "rbac"                   # rbac / abac
      
    # 加密
    encryption:
      enabled: true
      algorithm: "aes-256"
      key_rotation_days: 90

# ============================================================================
# 9. 監控和可觀測性
# ============================================================================
observability:
  enabled: true
  
  # 日誌記錄
  logging:
    enabled: true
    
    # 日誌級別
    level: "INFO"                     # DEBUG / INFO / WARNING / ERROR / CRITICAL
    
    # 日誌輸出
    outputs:
      - type: "file"
        path: "logs/agents.log"
        rotation_mb: 100
        retention_days: 30
        
      - type: "elasticsearch"
        enabled: false
        endpoint: "http://localhost:9200"
        
      - type: "stdout"
        enabled: true
        format: "json"
  
  # 指標收集
  metrics:
    enabled: true
    
    # 收集器
    collectors:
      - type: "prometheus"
        port: 9090
        scrape_interval_seconds: 15
        
    # 指標
    collected_metrics:
      - "agent_task_count"
      - "agent_accuracy"
      - "agent_response_time"
      - "agent_memory_usage"
      - "queue_depth"
      - "message_latency"
  
  # 分布式追蹤
  tracing:
    enabled: true
    
    # 追蹤配置
    config:
      sampler_type: "probabilistic"
      sample_rate: 0.1
      
    # 追蹤後端
    backend: "jaeger"
    endpoint: "http://localhost:6831"
    
  # 警報
  alerting:
    enabled: true
    
    # 告警規則
    rules:
      - alert: "AgentUnresponsive"
        condition: "heartbeat_failure > 3"
        severity: "critical"
        
      - alert: "HighErrorRate"
        condition: "error_rate > 0.05"
        severity: "warning"
        
      - alert: "PerformanceDegradation"
        condition: "response_time > threshold"
        severity: "warning"

# ============================================================================
# 10. 集成配置
# ============================================================================
integration:
  enabled: true
  
  # 外部服務集成
  external_services:
    - service: "openai"
      enabled: true
      api_endpoint: "https://api.openai.com"
      model: "gpt-4-turbo"
      
    - service: "anthropic"
      enabled: false
      api_endpoint: "https://api.anthropic.com"
      model: "claude-3-opus"
  
  # 消息匯流排
  message_broker:
    type: "redis"
    host: "localhost"
    port: 6379
    
  # 數據存儲
  data_storage:
    type: "mongodb"
    host: "localhost"
    port: 27017

# ============================================================================
# EOF - 多智能體系統完整配置
# ============================================================================
