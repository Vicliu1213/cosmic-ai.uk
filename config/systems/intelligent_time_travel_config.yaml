# ============================================================================
# 智能時間旅行系統配置 (Intelligent Time Travel System Configuration)
# ============================================================================
# 這個檔案配置智能時間旅行系統，支持時間序列預測、未來情景模擬、
# 時間循環檢測、因果推理和時間軸管理。
# ============================================================================

# ============================================================================
# 1. 時間旅行系統全局配置 (Global Settings)
# ============================================================================
intelligent_time_travel:
  enabled: true
  version: "1.0"
  system_name: "Intelligent Time Travel System"
  description: "跨時間維度的智能預測和決策系統"
  
  # 系統模式
  operation_mode: "prediction_and_simulation"  # "prediction", "simulation", "hybrid"
  
  # 時間維度配置
  time_dimensions:
    primary_timeline: true
    alternate_timelines: 5      # 支持 5 條替代時間軸
    timeline_branching: true
    timeline_convergence: true
    
  # 時間跨度
  time_horizons:
    short_term_days: 7          # 短期：7 天
    medium_term_days: 90        # 中期：90 天
    long_term_days: 365         # 長期：1 年
    ultra_long_term_days: 1825  # 超長期：5 年

# ============================================================================
# 2. 時間預測引擎配置 (Time Prediction Engine)
# ============================================================================
time_prediction:
  enabled: true
  
  # 預測方法
  prediction_methods:
    - name: "lstm_sequence"
      enabled: true
      weight: 0.30
      lookback_periods: 60
      forecast_horizon: 30
      layers: 3
      hidden_units: 128
      dropout_rate: 0.2
      
    - name: "transformer_temporal"
      enabled: true
      weight: 0.25
      lookback_periods: 256
      forecast_horizon: 30
      attention_heads: 8
      encoder_layers: 3
      decoder_layers: 3
      
    - name: "arima_seasonal"
      enabled: true
      weight: 0.20
      order: [1, 1, 1]           # (p, d, q)
      seasonal_order: [1, 1, 1, 12]  # (P, D, Q, m)
      
    - name: "prophet"
      enabled: true
      weight: 0.15
      yearly_seasonality: true
      weekly_seasonality: true
      daily_seasonality: false
      
    - name: "quantum_inspired"
      enabled: true
      weight: 0.10
      quantum_gates: 8
      entanglement_strength: 0.8
      
  # 預測集合
  ensemble:
    aggregation_method: "weighted_average"  # "weighted_average", "median", "mode"
    confidence_threshold: 0.70
    uncertainty_estimation: true
    
  # 時間序列特性
  time_series:
    decomposition_enabled: true
    trend_analysis: true
    seasonality_detection: true
    anomaly_detection: true
    autocorrelation_analysis: true

# ============================================================================
# 3. 時間循環檢測 (Temporal Cycle Detection)
# ============================================================================
temporal_cycles:
  enabled: true
  
  # 循環檢測算法
  cycle_detection:
    enabled: true
    methods:
      - "fft"                   # 快速傅里葉變換
      - "wavelet"               # 小波分析
      - "hilbert_transform"     # Hilbert 變換
      - "autocorrelation"       # 自相關
      
  # 週期識別
  period_identification:
    min_period_bars: 5
    max_period_bars: 500
    period_tolerance: 0.05      # 5% 容差
    
    # 常見週期
    known_cycles:
      - name: "market_session"
        period_hours: 24
        enabled: true
        
      - name: "weekly"
        period_hours: 168
        enabled: true
        
      - name: "monthly"
        period_days: 30
        enabled: true
        
      - name: "quarterly"
        period_days: 90
        enabled: true
        
      - name: "economic_cycle"
        period_years: 3
        enabled: true
        
  # 循環相位追踪
  phase_tracking:
    enabled: true
    phase_resolution: 0.01      # 1% 相位解析度
    phase_continuation: true    # 相位連續性檢查

# ============================================================================
# 4. 情景模擬和蒙特卡洛配置 (Scenario Simulation & Monte Carlo)
# ============================================================================
scenario_simulation:
  enabled: true
  
  # 蒙特卡洛模擬
  monte_carlo:
    enabled: true
    simulations_per_scenario: 10000  # 每個情景的模擬次數
    random_seed_management: true
    variance_reduction_enabled: true
    
    # 方差削減技術
    variance_reduction_method:
      method: "antithetic_variates"  # "antithetic", "control_variates", "importance_sampling"
      efficiency_gain: 0.5      # 期望效率提升
      
  # 隨機過程
  stochastic_processes:
    - name: "geometric_brownian_motion"
      enabled: true
      drift_estimation: "adaptive"
      volatility_estimation: "rolling_window"
      
    - name: "vasicek_interest_rate"
      enabled: true
      mean_reversion_speed: 0.15
      long_term_mean: 0.03
      volatility: 0.02
      
    - name: "jump_diffusion"
      enabled: true
      jump_probability: 0.01
      jump_mean: 0.0
      jump_volatility: 0.05
      
    - name: "markov_chain"
      enabled: true
      states: ["bullish", "neutral", "bearish"]
      transition_matrix: [[0.7, 0.2, 0.1], [0.2, 0.6, 0.2], [0.1, 0.2, 0.7]]
  
  # 情景生成
  scenario_generation:
    methods:
      - name: "historical_bootstrap"
        enabled: true
        weight: 0.3
        historical_window_days: 365
        
      - name: "parametric"
        enabled: true
        weight: 0.4
        distribution: "normal"  # "normal", "student_t", "mixture"
        
      - name: "stressed_scenarios"
        enabled: true
        weight: 0.3
        
    scenarios:
      - name: "base_case"
        probability: 0.5
        adjustment_factors: []
        
      - name: "bull_market"
        probability: 0.25
        adjustment_factors:
          volatility: -0.3      # 減少 30% 波動率
          returns: 1.5          # 增加 50% 回報
          
      - name: "bear_market"
        probability: 0.15
        adjustment_factors:
          volatility: 1.5       # 增加 50% 波動率
          returns: -1.0         # 負收益
          
      - name: "crisis"
        probability: 0.10
        adjustment_factors:
          volatility: 3.0       # 3 倍波動率
          returns: -3.0         # 3 倍負收益
          liquidity: 0.3        # 流動性下降 70%

# ============================================================================
# 5. 因果推理和反事實分析 (Causal Inference & Counterfactual Analysis)
# ============================================================================
causal_inference:
  enabled: true
  
  # 因果發現
  causal_discovery:
    enabled: true
    algorithm: "pc"             # "pc", "ges", "lingam", "granger_causality"
    
    pc_algorithm:
      alpha: 0.05               # 顯著性水平
      correlation_method: "pearson"
      
    granger_causality:
      enabled: true
      max_lag: 12               # 最大滯後期
      significance_level: 0.05
      
  # 因果圖建構
  causal_graph:
    enabled: true
    visualize_dag: true
    validate_acyclicity: true
    
  # 反事實分析
  counterfactual_analysis:
    enabled: true
    methods:
      - name: "twin_method"
        enabled: true
        match_threshold: 0.95
        
      - name: "synthetic_control"
        enabled: true
        donor_pool_size: 100
        
      - name: "doubly_robust"
        enabled: true
        propensity_score_method: "logistic"
        outcome_model: "linear"

# ============================================================================
# 6. 時間軸管理 (Timeline Management)
# ============================================================================
timeline_management:
  enabled: true
  
  # 多時間軸支持
  multitimeline:
    enabled: true
    max_timelines: 10
    timeline_sync_interval_ms: 100
    
    # 時間軸操作
    operations:
      branch_timeline: true      # 創建分支時間軸
      merge_timelines: true      # 合併時間軸
      rewind: true               # 時間倒退
      fastforward: true          # 快進
      
  # 時間軸一致性
  consistency:
    enabled: true
    check_causality: true
    check_energy_conservation: true
    check_information_preservation: true
    
    # 不確定性原理
    uncertainty_principle:
      enabled: true
      position_uncertainty: 0.01      # 時間位置不確定性
      momentum_uncertainty: 0.001     # 時間動量不確定性
      minimum_product: 0.0001         # Δt × Δv_t ≥ h_bar
      
  # 時間軸同步
  synchronization:
    enabled: true
    method: "lamport_clock"     # "lamport", "vector_clock", "matrix_clock"
    sync_frequency_hz: 1000
    max_clock_skew_ms: 10

# ============================================================================
# 7. 信息流和因果結構 (Information Flow & Causal Structure)
# ============================================================================
information_flow:
  enabled: true
  
  # 信息傳播
  propagation:
    enabled: true
    speed: "light_speed"        # 光速極限
    
    # 信息頻道
    channels:
      - name: "market_microstructure"
        latency_ms: 1
        bandwidth_messages_per_sec: 10000
        
      - name: "news_feed"
        latency_ms: 100
        bandwidth_messages_per_sec: 100
        
      - name: "economic_indicators"
        latency_ms: 3600000     # 1 小時
        bandwidth_messages_per_sec: 10
        
  # 因果結構
  causal_structure:
    enabled: true
    
    # 光錐分析
    lightcone_analysis:
      enabled: true
      future_lightcone_window_days: 30
      past_lightcone_window_days: 30
      
  # 信息熵
  information_entropy:
    enabled: true
    track_entropy: true
    entropy_increase_rate: true  # 檢查熱力學第二定律
    
  # 時間箭頭
  arrow_of_time:
    enabled: true
    thermodynamic_arrow: true   # 熱力學箭頭
    psychological_arrow: true   # 心理學箭頭
    cosmological_arrow: true    # 宇宙學箭頭

# ============================================================================
# 8. 預測準確性和驗證 (Prediction Accuracy & Validation)
# ============================================================================
prediction_validation:
  enabled: true
  
  # 準確性指標
  accuracy_metrics:
    - name: "mae"               # 平均絕對誤差
      enabled: true
      
    - name: "rmse"              # 均方根誤差
      enabled: true
      
    - name: "mape"              # 平均絕對百分比誤差
      enabled: true
      
    - name: "direction_accuracy"  # 方向準確度
      enabled: true
      
    - name: "sharpe_ratio"
      enabled: true
      
    - name: "sortino_ratio"
      enabled: true
  
  # 回溯測試框架
  backtesting:
    enabled: true
    period_days: 365
    walk_forward_enabled: true
    walk_forward_window_days: 60
    walk_forward_step_days: 20
    
  # 外部驗證
  out_of_sample:
    enabled: true
    test_set_ratio: 0.2
    time_series_split: true
    num_splits: 5
    
  # 模型對比
  model_comparison:
    enabled: true
    statistical_tests: ["diebold_mariano", "harvey_newbold"]
    significance_level: 0.05

# ============================================================================
# 9. 實時預測更新 (Real-Time Prediction Updates)
# ============================================================================
real_time_updates:
  enabled: true
  
  # 更新策略
  update_strategy:
    frequency_minutes: 5        # 每 5 分鐘更新
    batch_size: 100             # 批處理大小
    
    # 增量學習
    incremental_learning:
      enabled: true
      forgetting_factor: 0.95   # 舊數據的衝擊
      warmup_samples: 100
      
  # 流式處理
  streaming:
    enabled: true
    buffer_size: 10000
    timeout_seconds: 60
    
  # 特徵工程
  feature_engineering:
    enabled: true
    lag_features: [1, 5, 10, 20]
    rolling_windows: [5, 20, 50]
    technical_indicators: true

# ============================================================================
# 10. 時間旅行決策支持 (Time Travel Decision Support)
# ============================================================================
decision_support:
  enabled: true
  
  # 決策框架
  framework:
    method: "expected_utility"  # "expected_utility", "robust_optimization", "regret_minimization"
    
    # 預期效用
    utility_function:
      type: "power_utility"     # "linear", "power_utility", "logarithmic"
      risk_aversion: 2.0        # 風險厭惡係數
      
  # 決策規則
  decision_rules:
    - name: "go_no_go"
      threshold: 0.7            # 70% 置信度才行動
      
    - name: "kelly_criterion"
      enabled: true
      kelly_fraction: 0.25      # 凱利分數的 25%
      
    - name: "minimax"
      enabled: true             # 最小化最大損失
      
  # 對沖和保護
  hedging:
    enabled: true
    hedge_ratio: 0.5
    instruments: ["options", "futures", "swaps"]

# ============================================================================
# 11. 監控和警報 (Monitoring & Alerts)
# ============================================================================
monitoring:
  enabled: true
  
  # 性能監控
  performance_monitoring:
    enabled: true
    metrics_interval_seconds: 60
    
  # 警報配置
  alerts:
    enabled: true
    alert_channels: ["email", "slack", "webhook"]
    
    alert_types:
      - name: "prediction_divergence"
        threshold: 3.0          # 標準差
        
      - name: "timeline_inconsistency"
        threshold: 0.05         # 5% 不一致
        
      - name: "causality_violation"
        severity: "critical"
        
      - name: "model_degradation"
        threshold: 0.10         # 10% 性能下降

# ============================================================================
# 12. 配置預設 (Configuration Profiles)
# ============================================================================
default_profile: "balanced"

profiles:
  conservative:
    prediction_horizon_days: 7
    confidence_threshold: 0.85
    scenarios_count: 1000
    model_weights:
      lstm: 0.2
      transformer: 0.2
      arima: 0.3
      prophet: 0.2
      quantum: 0.1
    risk_management: "aggressive"
    
  balanced:
    prediction_horizon_days: 30
    confidence_threshold: 0.70
    scenarios_count: 10000
    model_weights:
      lstm: 0.30
      transformer: 0.25
      arima: 0.20
      prophet: 0.15
      quantum: 0.10
    risk_management: "balanced"
    
  aggressive:
    prediction_horizon_days: 365
    confidence_threshold: 0.60
    scenarios_count: 50000
    model_weights:
      lstm: 0.35
      transformer: 0.30
      arima: 0.10
      prophet: 0.10
      quantum: 0.15
    risk_management: "minimal"
