# ============================================================================
# 奇點宇宙智能系統配置 (Singularity Universe Intelligent System Configuration)
# ============================================================================
# 這個檔案配置奇點宇宙共振突破交易系統，整合量子增強、多智能體框架、
# 和高階共振機制，實現超级智能交易和市場分析。
# ============================================================================

# ============================================================================
# 1. 奇點宇宙系統全局配置 (Global Settings)
# ============================================================================
singularity_universe:
  enabled: true
  version: "2.0"
  system_name: "Singularity Universe Intelligent System"
  description: "量子共振驅動的多智能體宇宙交易系統"
  
  # 系統層級
  system_tier: "enterprise"    # "standalone", "enterprise", "cosmic"
  deployment_mode: "distributed"  # "local", "distributed", "cloud"
  
  # 核心參數
  universe_dimension: 512      # 宇宙維度 [256, 1024]
  resonance_frequency: 3.33    # 共振頻率 (Hz) [1.0, 10.0]
  coherence_target: 0.99       # 相干性目標 [0.9, 0.999]
  
  # 成本和資源
  quantum_budget: 1.5          # 量子預算（標準單位）
  max_agents: 50               # 最大智能體數量 [10, 200]
  computation_timeout_ms: 5000 # 計算超時（毫秒）

# ============================================================================
# 2. 量子共振引擎配置 (Quantum Resonance Engine)
# ============================================================================
quantum_resonance:
  enabled: true
  
  # 共振機制
  resonance:
    type: "harmonic"           # "harmonic", "sympathetic", "constructive"
    coupling_strength: 0.85    # 耦合強度 [0.5, 1.0]
    decay_factor: 0.02         # 衰減因子 [0.001, 0.1]
    reinforcement_factor: 1.2  # 強化因子 [0.9, 2.0]
    
  # 量子態管理
  quantum_state:
    superposition_enabled: true
    entanglement_enabled: true
    coherence_protection: true
    decoherence_correction: true
    
    # 量子糾纏配置
    entanglement:
      max_entangled_pairs: 512   # 最大糾纏對數
      entanglement_depth: 16     # 糾纏深度
      bell_state_fidelity: 0.98  # Bell 態保真度
      
  # 量子場配置
  field:
    field_dimension: 512        # 場維度 [256, 1024]
    lattice_type: "cubic"       # "cubic", "hexagonal", "random"
    coupling_constants:
      hopping: 0.1
      interaction: 0.05
      external: 0.02

# ============================================================================
# 3. 多智能體系統配置 (Multi-Agent System)
# ============================================================================
multi_agent_system:
  enabled: true
  framework: "semantic_kernel"  # "semantic_kernel", "autogen", "crewai", "custom"
  
  # 智能體池
  agent_pool:
    total_agents: 50            # 總智能體數量 [10, 200]
    
    # 智能體分布
    agents:
      technical_analyst:
        count: 10               # 技術分析智能體
        role: "Technical Analysis"
        specialization: "chart_patterns, indicators, resistance_levels"
        
      fundamental_analyst:
        count: 8                # 基本面分析智能體
        role: "Fundamental Analysis"
        specialization: "financial_metrics, earnings, economic_data"
        
      sentiment_analyzer:
        count: 8                # 情感分析智能體
        role: "Sentiment Analysis"
        specialization: "market_sentiment, news, social_media"
        
      risk_manager:
        count: 6                # 風險管理智能體
        role: "Risk Management"
        specialization: "position_sizing, stop_loss, portfolio_risk"
        
      execution_agent:
        count: 10               # 執行智能體
        role: "Trade Execution"
        specialization: "order_placement, timing, slippage_minimization"
        
      strategy_optimizer:
        count: 5                # 策略優化智能體
        role: "Strategy Optimization"
        specialization: "parameter_tuning, backtest, monte_carlo"
        
      market_microstructure:
        count: 3                # 市場微觀結構智能體
        role: "Market Microstructure"
        specialization: "order_flow, liquidity, bid_ask_spread"
  
  # 智能體通信
  communication:
    protocol: "message_queue"   # "message_queue", "api", "websocket"
    message_broker: "redis"     # "redis", "rabbitmq", "kafka"
    latency_budget_ms: 100      # 延遲預算（毫秒）
    throughput_ops_sec: 10000   # 吞吐量（操作/秒）
    
  # 智能體協調
  coordination:
    mechanism: "hierarchical"   # "hierarchical", "democratic", "swarm"
    leader_election: "automatic"
    consensus_method: "weighted_voting"  # "consensus", "majority", "weighted_voting"
    
    # 動態調度
    scheduling:
      algorithm: "priority_queue"  # "fifo", "priority_queue", "round_robin"
      task_batching: true
      batch_size: 16
      
  # 智能體學習
  learning:
    enabled: true
    learning_type: "reinforcement"  # "supervised", "reinforcement", "unsupervised"
    
    # 強化學習設置
    reinforcement:
      algorithm: "ppo"          # "dqn", "ppo", "a3c", "actor_critic"
      discount_factor: 0.99     # γ
      learning_rate: 0.0003
      batch_size: 64
      experience_replay_size: 100000
      
      # 獎勵配置
      rewards:
        profit_reward: 1.0
        risk_penalty: -0.5
        execution_quality: 0.3
        information_quality: 0.2

# ============================================================================
# 4. 交易策略配置 (Trading Strategy)
# ============================================================================
trading_strategy:
  enabled: true
  
  # 核心策略
  strategies:
    quantum_momentum:
      enabled: true
      weight: 0.25             # 策略權重
      lookback_period: 20
      threshold: 0.65
      
    sentiment_reversal:
      enabled: true
      weight: 0.20
      sentiment_threshold: 0.75
      mean_reversion_strength: 0.8
      
    arbitrage_capture:
      enabled: true
      weight: 0.20
      min_spread: 0.0001
      execution_speed: "fast"   # "slow", "normal", "fast"
      
    liquidity_harvesting:
      enabled: true
      weight: 0.15
      depth_analysis_levels: 10
      
    volatility_breakout:
      enabled: true
      weight: 0.20
      volatility_period: 14
      breakout_threshold: 2.0   # 標準差倍數
      
  # 策略權重自適應
  adaptive_weighting:
    enabled: true
    update_frequency_hours: 4
    performance_memory_days: 30
    min_weight: 0.05
    max_weight: 0.50

# ============================================================================
# 5. 市場數據和信號配置 (Market Data & Signals)
# ============================================================================
market_data:
  # 數據源配置
  data_sources:
    - name: "binance"
      enabled: true
      priority: 1
      latency_ms: 100
      symbols: ["BTCUSDT", "ETHUSDT", "BNBUSDT"]
      
    - name: "coinbase"
      enabled: true
      priority: 2
      latency_ms: 150
      
  # 數據聚合
  aggregation:
    method: "weighted_average" # "average", "weighted_average", "median"
    weights:
      binance: 0.5
      coinbase: 0.3
      other: 0.2
      
  # 信號生成
  signal_generation:
    update_frequency_ms: 1000
    lookback_periods: [5, 20, 50, 200]
    confidence_threshold: 0.60
    signal_types:
      - "momentum"
      - "reversal"
      - "breakout"
      - "support_resistance"
      - "trend"
      
  # 信號驗證
  signal_validation:
    cross_validation_enabled: true
    minimum_validators: 3
    validation_agreement_threshold: 0.66

# ============================================================================
# 6. 量子增強配置 (Quantum Enhancement)
# ============================================================================
quantum_enhancement:
  enabled: true
  
  # 量子門操作
  quantum_gates:
    available_gates:
      - "hadamard"
      - "pauli_x"
      - "pauli_y"
      - "pauli_z"
      - "phase_shift"
      - "cnot"
      - "toffoli"
      - "swap"
      - "rx"
      - "ry"
      - "rz"
    
    gate_depth: 20              # 電路深度
    optimization_level: "aggressive"  # "none", "basic", "aggressive"
    
  # 量子啟發式搜索
  quantum_inspired_search:
    algorithm: "grover"         # "grover", "vqe", "qaoa"
    iterations: 100
    success_probability_target: 0.95
    
  # 量子-古典混合
  hybrid_execution:
    quantum_portion: 0.3        # 30% 量子計算
    classical_portion: 0.7      # 70% 古典計算
    switching_threshold: 0.5    # 決策點

# ============================================================================
# 7. 風險管理和頭寸管理配置 (Risk & Position Management)
# ============================================================================
risk_management:
  enabled: true
  
  # 頭寸大小管理
  position_sizing:
    method: "kelly_modified"    # "fixed", "kelly", "kelly_modified", "volatility_based"
    
    # Kelly 公式參數
    kelly:
      win_rate_estimate: 0.55
      avg_win_loss_ratio: 1.5
      kelly_fraction: 0.25      # 25% of Kelly
      
    # 風險限制
    limits:
      max_position_size: 0.1    # 資金的 10%
      min_position_size: 0.01
      max_portfolio_risk: 0.02  # 2% 最大風險
      
  # 止損和止盈
  stop_loss_take_profit:
    stop_loss_enabled: true
    stop_loss_type: "both"      # "fixed", "trailing", "both"
    fixed_stop_loss_percent: 2.0
    trailing_stop_percent: 1.5
    
    take_profit_enabled: true
    take_profit_type: "tiered"  # "fixed", "tiered", "dynamic"
    
    tiered_levels:
      - level: 1
        profit_target: 2.0      # 2%
        portion: 0.3            # 出場 30%
      - level: 2
        profit_target: 5.0      # 5%
        portion: 0.3
      - level: 3
        profit_target: 10.0     # 10%
        portion: 0.4
    
  # 最大回撤管理
  max_drawdown:
    enabled: true
    hard_limit: 0.20            # 20% 絕對上限
    soft_limit: 0.15            # 15% 軟限制
    cooldown_period_hours: 2
    
  # 相關性管理
  correlation_management:
    enabled: true
    max_correlated_positions: 3
    correlation_threshold: 0.7
    
  # 壓力測試
  stress_testing:
    enabled: true
    frequency_hours: 24
    scenarios:
      - name: "market_crash"
        severity: "extreme"     # "low", "medium", "high", "extreme"
      - name: "liquidity_crisis"
        severity: "high"
      - name: "volatility_spike"
        severity: "high"

# ============================================================================
# 8. 執行和訂單管理配置 (Execution & Order Management)
# ============================================================================
execution:
  enabled: true
  
  # 訂單放置
  order_placement:
    primary_method: "smart_routing"  # "market", "limit", "smart_routing"
    slippage_tolerance: 0.001   # 0.1% 滑點容許
    order_timeout_seconds: 60
    
    # 智能路由
    smart_routing:
      enabled: true
      venue_selection: "optimal"  # "optimal", "fastest", "best_price"
      order_splitting: true
      num_splits: 5
      
  # 執行算法
  execution_algorithms:
    default: "twap"             # "vwap", "twap", "pov", "minimal_impact"
    
    twap:
      enabled: true
      participation_rate: 1.0   # 100% 参与
      time_window_seconds: 300
      
    vwap:
      enabled: true
      historical_period_days: 20
      
  # 訂單管理系統 (OMS)
  oms:
    enabled: true
    order_types: ["market", "limit", "stop", "stop_limit", "iceberg"]
    max_pending_orders: 100
    order_state_tracking: true
    
  # 交易所集成
  exchange_integration:
    exchanges: ["binance", "coinbase", "kraken"]
    sandbox_mode: false         # 生產模式
    api_rate_limits:
      binance: 1200             # 請求/分鐘
      coinbase: 15              # 請求/秒
      
  # 執行監控
  execution_monitoring:
    enabled: true
    metrics_tracking:
      - "fill_rate"
      - "average_fill_price"
      - "execution_time"
      - "slippage"
      - "market_impact"

# ============================================================================
# 9. 性能監測和分析配置 (Performance Monitoring & Analytics)
# ============================================================================
performance_monitoring:
  enabled: true
  
  # 實時指標
  real_time_metrics:
    track_pnl: true
    track_drawdown: true
    track_sharpe_ratio: true
    track_sortino_ratio: true
    track_calmar_ratio: true
    update_frequency_ms: 1000
    
  # 性能分析
  analytics:
    enabled: true
    reporting_frequency_hours: 1
    
    # 回溯測試
    backtesting:
      enabled: true
      period_days: 365
      walk_forward_window_days: 90
      out_of_sample_ratio: 0.2
      
  # 警報和通知
  alerts:
    enabled: true
    alert_types:
      - "drawdown_warning"
      - "execution_failure"
      - "data_quality_issue"
      - "risk_limit_breach"
    notification_channels: ["email", "slack", "webhook"]

# ============================================================================
# 10. 配置預設 (Configuration Profiles)
# ============================================================================
default_profile: "balanced"

profiles:
  conservative:
    max_position_size: 0.05
    stop_loss_percent: 1.0
    risk_per_trade: 0.01
    strategy_weights:
      quantum_momentum: 0.2
      sentiment_reversal: 0.3
      arbitrage_capture: 0.1
      liquidity_harvesting: 0.2
      volatility_breakout: 0.2
    execution_speed: "slow"
    
  balanced:
    max_position_size: 0.1
    stop_loss_percent: 2.0
    risk_per_trade: 0.02
    strategy_weights:
      quantum_momentum: 0.25
      sentiment_reversal: 0.20
      arbitrage_capture: 0.20
      liquidity_harvesting: 0.15
      volatility_breakout: 0.20
    execution_speed: "normal"
    
  aggressive:
    max_position_size: 0.2
    stop_loss_percent: 3.0
    risk_per_trade: 0.05
    strategy_weights:
      quantum_momentum: 0.3
      sentiment_reversal: 0.15
      arbitrage_capture: 0.30
      liquidity_harvesting: 0.1
      volatility_breakout: 0.15
    execution_speed: "fast"

# ============================================================================
# 11. 系統整合和部署配置 (System Integration & Deployment)
# ============================================================================
system_integration:
  # 容器化部署
  containerization:
    enabled: true
    container_platform: "docker"  # "docker", "kubernetes", "singularity"
    image_version: "latest"
    
  # Kubernetes 部署
  kubernetes:
    enabled: false
    replicas: 3
    resource_limits:
      cpu: "4"
      memory: "8Gi"
    
  # 微服務架構
  microservices:
    enabled: true
    services:
      - name: "quantum_resonance_engine"
        replicas: 2
      - name: "multi_agent_system"
        replicas: 3
      - name: "market_data_processor"
        replicas: 2
      - name: "execution_engine"
        replicas: 1

# ============================================================================
# 12. 驗證和健康檢查 (Validation & Health Checks)
# ============================================================================
validation:
  startup_checks: true
  health_check_interval_seconds: 60
  
  checks:
    - name: "quantum_coherence"
      threshold: 0.95
    - name: "agent_responsiveness"
      threshold: 100           # ms
    - name: "data_freshness"
      threshold: 5000          # ms
    - name: "execution_success_rate"
      threshold: 0.95
