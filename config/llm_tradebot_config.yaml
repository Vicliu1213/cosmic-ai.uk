# LLM-TradeBot 配置文件
# LLM-TradeBot Configuration for Cosmic AI Integration

llm_tradebot:
  # LLM-TradeBot 服务器配置
  server:
    host: "127.0.0.1"
    port: 8000
    timeout: 30
    max_retries: 3

  # 多代理系统配置
  agents:
    # 分析代理
    analyst:
      enabled: true
      model: "gpt-4"
      temperature: 0.7
      max_tokens: 1000
    
    # 策略代理
    strategy:
      enabled: true
      model: "gpt-4"
      temperature: 0.6
      max_tokens: 1000
    
    # 风险代理
    risk:
      enabled: true
      model: "gpt-3.5-turbo"
      temperature: 0.5
      max_tokens: 500
    
    # 执行代理
    execution:
      enabled: true
      model: "gpt-3.5-turbo"
      temperature: 0.3
      max_tokens: 500

  # 决策聚合配置
  aggregation:
    # 投票规则 (n/m 代理同意)
    voting_threshold: 0.75  # 75% 代理同意
    confidence_threshold: 0.6  # 最小信心度
    
    # 权重配置
    weights:
      analyst: 0.25
      strategy: 0.35
      risk: 0.25
      execution: 0.15

  # 风控规则
  risk_management:
    max_position_size: 100
    max_daily_loss: -5000
    max_drawdown: -0.10  # -10%
    leverage_limit: 2.0
    
    # 止损/止盈规则
    stop_loss_ratio: 0.02  # 2%
    take_profit_ratio: 0.05  # 5%

  # 学习配置
  learning:
    enabled: true
    update_frequency: 3600  # 1 小时
    model_update_threshold: 0.05  # 性能改进 5%

# 日志配置
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/llm_tradebot_integration.log"
