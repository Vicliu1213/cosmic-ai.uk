# Compression Control Configuration
enabled: true
level: 6
formats:
  - png
  - jpg
  - jpeg
  - webp
max_size: 10MB
quality: 85
algorithm: auto
optimize: true
preserve_metadata: false
parallel_processing: true
cache_compressed: true
log_level: info
max_concurrent_jobs: 4
temp_directory: /tmp/compression
output_directory: /root/comic_ai/output/compressed