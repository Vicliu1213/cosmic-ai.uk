# 認證
authentication:
  enabled: true
  method: jwt
  jwt_secret: ${SECURITY_JWT_SECRET}
  jwt_algorithm: HS256
  jwt_expiration: 3600  # 1小時
  
  # 密碼政策
  password_policy:
    min_length: 12
    password_history: 10
    require_lowercase: true
    require_numbers: true
    require_symbols: true
    require_uppercase: true
  
  # 令牌過期
  token_expiry: 3600
  refresh_token_expiry: 86400
  
  # MFA
  mfa:
    enabled: false
    methods:
      - totp
      - email

# 授權
authorization:
  enabled: true
  method: rbac
  principle_of_least_privilege: true
  role_based_access: true
  
  # API 速率限制
  api_rate_limiting: true
  max_requests_per_minute: 1000
  
  # 角色定義
  roles:
    admin:
      permissions:
        - read
        - write
        - delete
        - manage_users
    trader:
      permissions:
        - read
        - trade
        - view_positions
    viewer:
      permissions:
        - read

# 加密
encryption:
  enabled: true
  data_at_rest: AES-256
  data_in_transit: TLS-1.3
  hashing_algorithm: SHA-256
  key_rotation_days: 90
  algorithm: AES-256-GCM
  
  # 敏感字段
  sensitive_fields:
    - api_keys
    - passwords
    - account_numbers
    - card_numbers

# SSL/TLS
ssl_tls:
  enabled: true
  certificate_path: ${SECURITY_SSL_CERT_PATH}
  key_path: ${SECURITY_SSL_KEY_PATH}
  min_version: TLSv1.2
  ciphers: HIGH:!aNULL:!MD5

# CORS
cors:
  enabled: true
  allowed_origins:
    - https://cosmic-ai.uk
    - https://www.cosmic-ai.uk
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
  allowed_headers:
    - Content-Type
    - Authorization

# 審計日誌
audit:
  enabled: true
  alert_on_suspicious_activity: true
  log_all_access: true
  log_data_modifications: true
  retention_days: 90
  
  # 日誌級別
  log_level: INFO
  
  # 記錄事件
  events:
    - authentication
    - authorization
    - data_access
    - data_modification
    - system_configuration
    - security_events
  
  # 日誌文件位置
  log_file: ${LOG_DIR}/audit.log
  max_size: 104857600  # 100MB
  backup_count: 50

# API 密鑰輪換
api_key_rotation:
  enabled: true
  interval: 86400  # 每24小時
  backup_enabled: true

# 請求簽名驗證
request_signing:
  enabled: true
  algorithm: HMAC-SHA256
  timestamp_validation: true
  expiration: 300  # 5分鐘

# 漏洞掃描
vulnerability_scanning:
  enabled: true
  
  # 定期掃描
  schedule:
    enabled: true
    frequency: weekly
    time: "02:00"  # UTC 2:00 AM
  
  # 依賴項掃描
  dependency_scan:
    enabled: true
    tools:
      - pip-audit
      - safety
