global:
  scrape_interval: 5s
  evaluation_interval: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'flink'
    static_configs:
      - targets: ['flink-jobmanager:8081']
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:8123']
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
  - job_name: 'pyroscope'
    static_configs:
      - targets: ['pyroscope:4040']
