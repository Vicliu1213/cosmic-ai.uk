# Pre-commit hooks configuration for Cosmic AI
# 預提交鉤子配置 - 確保代碼質量

repos:
  # Python syntax validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Check Python syntax
      - id: check-ast
        name: Check Python syntax
        language: python
        types: [python]
        stages: [commit]
      
      # Check for merge conflicts
      - id: check-merge-conflict
        name: Check for merge conflicts
      
      # Check YAML syntax
      - id: check-yaml
        name: Check YAML syntax
        args: ['--unsafe']
      
      # Fix end of file
      - id: end-of-file-fixer
        name: Fix end of file
        types: [python, text]
      
      # Trim trailing whitespace
      - id: trailing-whitespace
        name: Trim trailing whitespace
        types: [python, text]

  # Flake8 linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Flake8 linting
        language: python
        types: [python]
        args: ['--max-line-length=127', '--select=E9,F63,F7,F82']
        stages: [commit]

  # Import sorting with isort
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort - Sort Python imports
        language: python
        types: [python]
        args: ['--profile=black', '--line-length=127']
        stages: [commit]

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: mypy - Static type checker
        language: python
        types: [python]
        additional_dependencies: ['types-all', 'numpy']
        args: ['--ignore-missing-imports', '--no-error-summary']
        stages: [commit]
        exclude: ^(tests/|external/|demo_)

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: Bandit - Security vulnerability scanner
        language: python
        types: [python]
        args: ['-ll', '-i', '-x']
        stages: [commit]
        exclude: ^(tests/|external/)

# Global settings
default_language_version:
  python: python3.12

# Fail fast on first error
fail_fast: false

# Show all errors
verbose: false

# Minimum hook run time threshold (seconds)
minimum_pre_commit_framework_version: '2.16.0'
