# Intelligent Agents System Configuration
version: "1.0.0"
description: "Configuration for multi-agent intelligent system"

# System Configuration
system:
  max_agents: 25
  message_ttl: 3600  # seconds
  communication_protocol: "quantum_entangled"
  synchronization_interval: 1000  # milliseconds
  load_balancing: true
  
  # Resource Limits
  resource_limits:
    max_memory_per_agent: "512MB"
    max_cpu_per_agent: 0.1  # cores
    max_message_size: "10MB"
    
  # Security
  security:
    message_encryption: true
    agent_authentication: false
    quantum_key_distribution: true

# Agent Configuration
agents:
  quantum_analyst:
    count: 3
    priority: "high"
    capabilities:
      - quantum_analysis
      - theory_validation
      - optimization_suggestion
    quantum_properties:
      coherence_threshold: 0.9
      superposition_states: 4
      entanglement_depth: 3
    schedule:
      active_hours: [6, 22]
      rest_interval: 300  # seconds
      
  data_optimizer:
    count: 2
    priority: "medium"
    capabilities:
      - data_compression
      - storage_optimization
      - access_pattern_analysis
    quantum_properties:
      coherence_threshold: 0.8
      superposition_states: 3
      entanglement_depth: 2
    performance:
      target_compression_ratio: 0.7
      max_processing_time: 5000  # ms
      
  system_monitor:
    count: 4
    priority: "critical"
    capabilities:
      - performance_monitoring
      - anomaly_detection
      - health_assessment
    quantum_properties:
      coherence_threshold: 0.95
      superposition_states: 2
      entanglement_depth: 2
    monitoring:
      check_interval: 1000  # ms
      alert_threshold: 0.85
      historical_retention: 86400  # seconds
      
  learning_advisor:
    count: 2
    priority: "medium"
    capabilities:
      - adaptive_learning
      - knowledge_extraction
      - experience_sharing
    quantum_properties:
      coherence_threshold: 0.85
      superposition_states: 3
      entanglement_depth: 4
    learning:
      learning_rate: 0.01
      experience_decay: 0.99
      knowledge_transfer_threshold: 0.8
      
  security_guardian:
    count: 1
    priority: "critical"
    capabilities:
      - security_monitoring
      - threat_response
      - access_control
    quantum_properties:
      coherence_threshold: 0.98
      superposition_states: 2
      entanglement_depth: 1
    security:
      threat_detection_sensitivity: 0.9
      automatic_response: true
      quarantine_duration: 3600  # seconds

# Quantum Network Configuration
quantum_network:
  coherence_threshold: 0.85
  entanglement_depth: 4
  superposition_capacity: 8
  decoherence_rate: 0.01
  
  # Quantum Communication
  communication:
    entanglement_pairs: 15
    quantum_channel_capacity: 1000  # messages/second
    synchronization_protocol: "quantum_clock"
    
  # Quantum Memory
  memory:
    quantum_ram_size: "1GB"
    coherence_time: 10000  # milliseconds
    retrieval_accuracy: 0.99
    
  # Quantum Processing
  processing:
    quantum_gates_available: 50
    quantum_circuit_depth: 100
    measurement_frequency: 1000  # Hz

# Communication Protocols
communication:
  message_types:
    - task_request
    - data_share
    - quantum_entanglement
    - status_update
    - alert_message
    - knowledge_transfer
    
  priority_levels:
    - critical: 0.1  # 100ms processing
    - high: 0.5      # 500ms processing
    - medium: 1.0     # 1s processing
    - low: 2.0        # 2s processing
    
  routing:
    broadcast_enabled: true
    direct_messaging: true
    group_messaging: true
    quantum_tunneling: true

# Performance Optimization
optimization:
  # Load Balancing
  load_balancing:
    algorithm: "quantum_aware"
    redistribution_threshold: 0.8
    hot_agent_detection: true
    
  # Caching
  caching:
    quantum_cache_size: "256MB"
    classical_cache_size: "512MB"
    cache_hit_target: 0.85
    
  # Resource Management
  resource_management:
    auto_scaling: true
    resource_prediction: true
    energy_optimization: true

# Logging and Monitoring
logging:
  level: "INFO"
  file: "logs/agents.log"
  max_size: "100MB"
  backup_count: 15
  
  # Agent-specific logging
  agent_logging:
    log_all_messages: true
    log_state_changes: true
    log_quantum_states: false
    log_performance_metrics: true
    
  # System monitoring
  system_monitoring:
    collect_agent_metrics: true
    collect_network_metrics: true
    collect_quantum_metrics: true
    alert_on_anomalies: true

# Development and Testing
development:
  debug_mode: false
  test_environment: true
  simulation_mode: false
  
  # Agent Testing
  agent_testing:
    unit_tests: true
    integration_tests: true
    performance_tests: true
    quantum_tests: false
    
  # Simulation
  simulation:
    max_simulation_speed: 10.0  # realtime multiplier
    deterministic_mode: false
    reproducible_quantum: false