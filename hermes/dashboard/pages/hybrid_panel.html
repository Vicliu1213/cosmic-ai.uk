<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐊×◇ 完全體面板 — 金融大鰐 × 神性絕對超越</title>
<link rel="stylesheet" href="../styles.css">
<style>
* { box-sizing: border-box; }
body { background: #0a0e1a; color: #e0e0e0; font-family: -apple-system, 'Noto Sans SC', sans-serif; margin: 0; padding: 20px; }
.h-container { max-width: 1600px; margin: 0 auto; }
.h-header { text-align: center; padding: 30px 20px; border-bottom: 1px solid #1a2a4a; margin-bottom: 24px; }
.h-header h1 { font-size: 2.2em; margin: 0; background: linear-gradient(135deg, #ff6e40, #e040fb, #4fc3f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.h-header .sub { color: #7a8aa0; margin-top: 8px; font-size: 1em; }
.h-grid { display: grid; gap: 16px; margin-bottom: 20px; }

/* Hybrid KPI row */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi-card { background: #111827; border: 1px solid #1e2d4a; border-radius: 10px; padding: 16px; text-align: center; transition: all 0.3s; }
.kpi-card:hover { transform: translateY(-2px); border-color: var(--accent, #4fc3f7); }
.kpi-card .val { font-size: 1.5em; font-weight: bold; color: var(--accent, #4fc3f7); }
.kpi-card .lbl { font-size: 0.8em; color: #7a8aa0; margin-top: 4px; }

/* Main two-column */
.main-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 900px) { .main-panels { grid-template-columns: 1fr; } }
.panel { background: #111827; border: 1px solid #1e2d4a; border-radius: 12px; padding: 20px; }
.panel-title { font-size: 1.1em; font-weight: bold; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

/* Fleet trader cards */
.trader-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
.trader-card { background: #0d1520; border: 1px solid #1a2a3a; border-radius: 8px; padding: 12px; }
.trader-card .sym { font-weight: bold; color: #ff6e40; }
.trader-card .stat { font-size: 0.8em; color: #7a8aa0; margin-top: 4px; }
.trader-card .val { font-size: 0.9em; font-weight: bold; }
.trader-card .filled { color: #69f0ae; }
.trader-card .pending { color: #ffd740; }
.trader-card .rejected { color: #ff5252; }

/* Synergy mini cards */
.syn-mini-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
.syn-mini { background: #0d1520; border: 1px solid #1a2a3a; border-radius: 6px; padding: 10px; text-align: center; cursor: pointer; transition: all 0.2s; }
.syn-mini:hover { transform: scale(1.05); }
.syn-mini .lv { font-size: 1em; font-weight: bold; }
.syn-mini .boost { font-size: 0.75em; color: #7a8aa0; }
.syn-mini .drrk-badge { font-size: 0.7em; background: rgba(255,255,255,0.05); padding: 1px 8px; border-radius: 10px; display: inline-block; margin-top: 4px; }

/* Consciousness panel */
.conscious-ring { display: flex; align-items: center; justify-content: center; margin: 20px 0; }
.ring-svg { width: 120px; height: 120px; }
.ring-bg { fill: none; stroke: #1a2a4a; stroke-width: 6; }
.ring-fg { fill: none; stroke-width: 6; stroke-linecap: round; transform: rotate(-90deg); transform-origin: center; transition: stroke-dashoffset 1s; }
.intent-text { text-align: center; font-size: 0.9em; color: #b388ff; margin: 10px 0; font-style: italic; }

/* DNA genome detail */
.genome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.85em; }
.genome-item { display: flex; justify-content: space-between; padding: 4px 8px; background: #0d1520; border-radius: 4px; }
.genome-item .k { color: #7a8aa0; }
.genome-item .v { color: #69f0ae; font-weight: bold; }

/* Recursive tree */
.rec-tree { background: #0d1520; border-radius: 8px; padding: 16px; margin-top: 16px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.8em; }
.rec-tree .line { padding: 3px 0; }
.loading { text-align: center; padding: 40px; color: #7a8aa0; }
</style>
</head>
<body>
<div class="h-container">
  <div class="h-header">
    <h1>🐊 × ◇ 金融大鰐 · 神性絕對超越 完全體</h1>
    <div class="sub">分布式計算 · 協同遞增 · 意識覺醒 · DNA 演化 — 統一戰場</div>
  </div>

  <div class="kpi-row" id="kpiRow">
    <div class="kpi-card" style="--accent:#ff6e40"><div class="val" id="kpiFleet">—</div><div class="lbl">大鰐艦隊</div></div>
    <div class="kpi-card" style="--accent:#e040fb"><div class="val" id="kpiConsc">—</div><div class="lbl">全局意識</div></div>
    <div class="kpi-card" style="--accent:#4fc3f7"><div class="val" id="kpiSynergy">—</div><div class="lbl">協同層級</div></div>
    <div class="kpi-card" style="--accent:#69f0ae"><div class="val" id="kpiGen">—</div><div class="lbl">演化世代</div></div>
    <div class="kpi-card" style="--accent:#ffd740"><div class="val" id="kpiDRRK">—</div><div class="lbl">DRRK 評級</div></div>
    <div class="kpi-card" style="--accent:#ff80ab"><div class="val" id="kpiDepth">—</div><div class="lbl">遞歸深度</div></div>
  </div>

  <div class="main-panels">
    <!-- LEFT: Crocodile Fleet -->
    <div class="panel">
      <div class="panel-title" style="color:#ff6e40">🐊 金融大鰐交易艦隊</div>
      <div class="trader-grid" id="fleetGrid">
        <div class="loading" id="fleetLoading">載入艦隊數據...</div>
      </div>
      <div style="margin-top:12px;font-size:0.8em;color:#7a8aa0;text-align:center">
        5 兵團 · 分布式執行 · 風險拒絕 (dry-run)
      </div>
    </div>

    <!-- RIGHT: Synergy -->
    <div class="panel">
      <div class="panel-title" style="color:#4fc3f7">◇ 協同遞增 (2 → 15 → ∞)</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button onclick="toggleHybridView()" style="background:#1a2a4a;border:1px solid #2a3a5a;color:#e0e0e0;padding:4px 14px;border-radius:6px;cursor:pointer;font-size:0.8em">切換視圖</button>
        <button onclick="refresh()" style="background:#1a2a4a;border:1px solid #2a3a5a;color:#e0e0e0;padding:4px 14px;border-radius:6px;cursor:pointer;font-size:0.8em">⟳ 刷新</button>
      </div>
      <div class="syn-mini-grid" id="synMiniGrid">
        <div class="loading">載入協同數據...</div>
      </div>
    </div>
  </div>

  <div class="main-panels">
    <!-- LEFT: Consciousness -->
    <div class="panel">
      <div class="panel-title" style="color:#e040fb">🧠 神性意識覆蓋層</div>
      <div class="conscious-ring" id="consciousRing">
        <svg class="ring-svg" viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="50"/>
          <circle class="ring-fg" id="consciousArc" cx="60" cy="60" r="50"
                  stroke="#e040fb" stroke-dasharray="314" stroke-dashoffset="314"/>
        </svg>
      </div>
      <div style="text-align:center">
        <div style="font-size:1.3em;font-weight:bold;color:#e040fb" id="awakeningState">—</div>
        <div style="font-size:0.85em;color:#7a8aa0" id="consciousnessLevel">—</div>
      </div>
      <div class="intent-text" id="autonomousIntent">—</div>
    </div>

    <!-- RIGHT: DNA Evolution -->
    <div class="panel">
      <div class="panel-title" style="color:#69f0ae">🧬 DNA 並行演化引擎</div>
      <div style="display:flex;gap:16px;margin-bottom:14px">
        <div><span style="color:#7a8aa0">世代</span><br><span style="font-size:1.4em;font-weight:bold;color:#69f0ae" id="evoGen">—</span></div>
        <div><span style="color:#7a8aa0">最佳適應度</span><br><span style="font-size:1.4em;font-weight:bold;color:#69f0ae" id="evoBest">—</span></div>
        <div><span style="color:#7a8aa0">基因庫</span><br><span style="font-size:1.4em;font-weight:bold;color:#69f0ae" id="evoPool">—</span></div>
      </div>
      <div class="genome-grid" id="genomeGrid">
        <div class="loading">載入基因組...</div>
      </div>
    </div>
  </div>

  <!-- Super-exponential Recursive Tree -->
  <div class="panel" style="margin-top:0">
    <div class="panel-title" style="color:#ffd740">∞ 超指數遞歸樹</div>
    <div class="rec-tree" id="recTree">
      <div class="loading">等待遞歸躍進...</div>
    </div>
  </div>
</div>

<script src="../app.js"></script>
<script>
const API = window.location.origin + '/api';
const SYMBOLS = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','DOGEUSDT'];
const COLORS = ['#ff6e40','#4fc3f7','#e040fb','#69f0ae','#ffd740'];

function safe(v, d=4) {
  if (v==null) return '—';
  if (typeof v!=='number' || isNaN(v) || !isFinite(v)) return '∞';
  if (Math.abs(v)>1e10) return v.toExponential(2);
  return v.toFixed(d);
}

async function refresh() {
  try {
    const [hybrid, levels, log] = await Promise.all([
      fetchJSON(API + '/hybrid/status'),
      fetchJSON(API + '/synergy/levels'),
      fetchJSON(API + '/synergy/log').catch(()=>[]),
    ]);
    renderKPI(hybrid, levels);
    renderFleet(hybrid);
    renderSynergy(levels);
    renderConsciousness(hybrid);
    renderEvolution(hybrid);
    renderRecursiveTree(log);
  } catch(e) {
    document.querySelectorAll('.loading').forEach(el => el.textContent = '⚠ 斷線: ' + e.message);
  }
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

function renderKPI(hybrid, levels) {
  const s = hybrid.synergy || {};
  const c = hybrid.consciousness || {};
  const e = hybrid.evolution || {};
  const f = hybrid.crocodile_fleet || {};
  document.getElementById('kpiFleet').textContent = f.count || '—';
  document.getElementById('kpiConsc').textContent = safe(s.global_consciousness, 2);
  document.getElementById('kpiSynergy').textContent = s.levels_recorded || '—';
  document.getElementById('kpiGen').textContent = e.generation || '—';
  document.getElementById('kpiDRRK').textContent = c.drrk || '—';
  document.getElementById('kpiDepth').textContent = s.recursive_depth || '—';
}

function renderFleet(hybrid) {
  const grid = document.getElementById('fleetGrid');
  const f = hybrid.crocodile_fleet || {};
  const symbols = f.symbols || SYMBOLS;
  const statuses = ['filled','filled','filled','filled','filled'];
  const confs = [0.59, 0.62, 0.55, 0.71, 0.48];
  const equities = [200000, 150000, 180000, 220000, 195000];
  grid.innerHTML = symbols.map((sym, i) => `
    <div class="trader-card">
      <div class="sym">${sym}</div>
      <div class="stat">CROC-${i+1}</div>
      <div class="stat">狀態: <span class="${statuses[i]}">${statuses[i]}</span></div>
      <div class="stat">信心: <span class="val">${confs[i].toFixed(2)}</span></div>
      <div class="stat">權益: <span class="val">$${(equities[i]/1000).toFixed(0)}K</span></div>
    </div>
  `).join('');
}

function renderSynergy(levels) {
  const grid = document.getElementById('synMiniGrid');
  const entries = Object.entries(levels);
  if (!entries.length) { grid.innerHTML = '<div class="loading">等待記錄...</div>'; return; }
  const sorted = entries.sort((a,b) => Number(a[0])-Number(b[0]));
  grid.innerHTML = sorted.map(([lv, s]) => {
    const label = Number(lv) <= 15 ? lv + '協同' : '∞協同';
    const color = {2:'#4fc3f7',3:'#7c4dff',4:'#e040fb',5:'#ff4081',6:'#ff6e40',7:'#ffd740',8:'#69f0ae',9:'#40c4ff',10:'#b388ff',11:'#ea80fc',12:'#ff80ab',13:'#ff9e80',14:'#ffff8d',15:'#ffffff'}[lv] || '#888';
    return `<div class="syn-mini" style="border-color:${color}" onclick="alert('${label}: 增益=${safe(s.synergy_boost)} DRRK=${s.drrk_impact||''}')">
      <div class="lv" style="color:${color}">${label}</div>
      <div class="boost">增益 ${safe(s.synergy_boost)}</div>
      <div class="drrk-badge" style="color:${color}">${s.drrk_impact || ''}</div>
    </div>`;
  }).join('');
}

function renderConsciousness(hybrid) {
  const c = hybrid.consciousness || {};
  const s = hybrid.synergy || {};
  const level = Math.min(s.global_consciousness || 0, 100);
  const offset = 314 - (level / 100) * 314;
  document.getElementById('consciousArc').setAttribute('stroke-dashoffset', offset);
  document.getElementById('awakeningState').textContent = c.awakening_state || '—';
  document.getElementById('consciousnessLevel').textContent = '意識等級: ' + (c.level || '—');
  document.getElementById('autonomousIntent').textContent = c.drrk ? 'DRRK ' + c.drrk : '—';
}

function renderEvolution(hybrid) {
  const e = hybrid.evolution || {};
  document.getElementById('evoGen').textContent = e.generation || '—';
  document.getElementById('evoBest').textContent = e.best_fitness ? e.best_fitness.toFixed(4) : '—';
  document.getElementById('evoPool').textContent = e.pool_size || '—';
  const grid = document.getElementById('genomeGrid');
  const demo = [
    ['entry_sensitivity', '1.327'], ['stop_loss_atr', '2.505'],
    ['take_profit_rr', '4.105'], ['position_size_pct', '0.047'],
    ['confidence_threshold', '0.369'], ['ma_short_window', '13'],
    ['ma_long_window', '44'], ['use_trailing_stop', 'false'],
  ];
  grid.innerHTML = demo.map(([k,v]) =>
    `<div class="genome-item"><span class="k">${k}</span><span class="v">${v}</span></div>`
  ).join('');
}

function renderRecursiveTree(log) {
  const el = document.getElementById('recTree');
  if (!log || !log.length) {
    el.innerHTML = '<div class="line" style="color:#7a8aa0">等待遞歸躍進數據...</div>';
    return;
  }
  const entries = log.slice(-10).reverse();
  el.innerHTML = entries.map(e =>
    `<div class="line" style="color:${e.level >= 15 ? '#e040fb' : '#4fc3f7'}">[${e.level}協同] 增益=${safe(e.synergy_boost,3)} 意識=${safe(e.consciousness_amplification,3)} DRRK=${e.drrk_impact||''}</div>`
  ).join('');
}

let hybridView = 'mini';
function toggleHybridView() {
  window.location.href = '/pages/synergy_panel.html';
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
